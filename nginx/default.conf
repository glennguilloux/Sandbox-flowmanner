server {
    listen 80;
    server_name flowmanner.com www.flowmanner.com;

    location = / {
        return 301 https://$host/en/;
    }

    location / {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name flowmanner.com www.flowmanner.com;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location ~* \.(env|git|svn|htaccess|htpasswd|DS_Store)$ { return 444; }
    location ~ ^/(wp-admin|wp-login|xmlrpc|phpmyadmin|admin\.php) { return 444; }

    # ── Next.js API routes (auth, tts, config, onboarding, og) ──────────
    location /api/auth/ {
        proxy_pass http://frontend:3000/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/tts/ {
        proxy_pass http://frontend:3000/api/tts/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/config/ {
        proxy_pass http://frontend:3000/api/config/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/onboarding/ {
        proxy_pass http://frontend:3000/api/onboarding/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/og {
        proxy_pass http://frontend:3000/api/og;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Backend API (FastAPI on homelab via WireGuard) ──────────────────
    location /api/ {
        proxy_pass http://10.99.0.3:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 300;
    }

    # ── WebSocket ──────────────────────────────────────────────────────
    location /ws {
        proxy_pass http://10.99.0.3:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # ── Frontend (Next.js) ─────────────────────────────────────────────
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── sandboxd Live Previews ────────────────────────────────────────────
# Routes *.preview.flowmanner.com → homelab sandboxd Traefik via WireGuard.
# Traefik does Host-based routing to the correct sandbox container.
# Requires:
#   1. Wildcard DNS: *.preview.flowmanner.com → 74.208.115.142
#   2. Wildcard TLS cert at /etc/nginx/certs/preview.flowmanner.com/
#
# HTTP → HTTPS redirect for preview subdomains
server {
    listen 80;
    server_name ~^(?<subdomain>.+)\.preview\.flowmanner\.com$;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name ~^(?<subdomain>.+)\.preview\.flowmanner\.com$;

    ssl_certificate /etc/nginx/certs/preview.flowmanner.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/preview.flowmanner.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Proxy to sandboxd Traefik on the homelab via WireGuard.
    # Host header MUST be preserved — Traefik routes by Host.
    location / {
        proxy_pass http://10.99.0.3:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade support (for Vite HMR, etc.)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
