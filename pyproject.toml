[tool.mypy]
ignore_missing_imports = true
no_strict_optional = true
disable_error_code = ["annotation-unchecked"]
namespace_packages = false

[[tool.mypy.overrides]]
module = "app.migrations.versions.*"
disable_error_code = ["attr-defined"]

[[tool.mypy.overrides]]
module = "redis"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "redis.asyncio"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "requests"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "requests.adapters"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "yaml"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "cachetools"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "croniter"
ignore_missing_imports = true
