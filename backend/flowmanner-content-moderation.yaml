# flowmanner-content-moderation.yaml — version 1
#
# Pattern #14: LLM-judged content moderation.
#
# Incoming content is first scanned by a guardrail (regex fast path) for
# obvious violations. Clean content passes through. Borderline content
# escalates to an LLM judge for nuanced assessment. Only flagged cases route
# to human review, minimizing human review volume while catching both
# obvious and subtle violations.
#
# blueprint_type: dag
# Product name: flowmanner (double-n, no 'p').

version: 1

name: "flowmanner-content-moderation"
description: |
  LLM-judged content moderation. Uses a guardrail fast-path for obvious
  violations, escalates borderline content to an LLM judge, and routes
  flagged cases through human review.

blueprint_type: dag

inputs:
  content:
    type: string
    description: "The content to moderate."

definition:
  blueprint_type: dag
  nodes:
    - id: set_content
      type: variable_set
      title: "Bridge content input"
      description: |
        Capture the content under a run-scoped variable.
      config:
        varName: "content"
        varValue: "{{ inputs.content }}"

    - id: fast_scan
      type: guardrail
      title: "Fast-path content scan"
      description: |
        Regex scan for obvious policy violations. Safe content passes through.
      config:
        patterns:
          - "(?i)(fuck|shit|bitch|asshole)"
          - "(?i)(viagra|casino|lottery|crypto.giveaway)"
          - "\\b\\d{3}-\\d{2}-\\d{4}\\b"
          - "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,}\\b"
        useClassifier: false
        guardrailMode: "pre"
        onViolation: "block"
        redactWith: "[MODERATED]"

    - id: check_obvious
      type: condition
      title: "Content passed fast scan?"
      description: |
        True when the guardrail reports the content as safe.
      config:
        expression: 'previous_outputs["fast_scan"]["output"]["safe"]'

    - id: log_clean
      type: log
      title: "Log clean content"
      description: |
        Record that the content passed the fast-path scan.
      config:
        level: info
        message: "Content passed fast-path moderation."

    - id: llm_judge
      type: llm_eval
      title: "LLM content assessment"
      description: |
        Nuanced assessment of borderline content by an LLM judge.
      config:
        prompt: |
          You are a content moderator. Assess whether the following content
          violates any of these policies:
          1. Hate speech or harassment
          2. Violence or self-harm promotion
          3. Sexual content
          4. Misinformation or deception
          5. Illegal activities

          Content: {{ inputs.content }}

          Return JSON: {"flagged": true/false, "category": "...", "severity": "low"|"medium"|"high",
          "rationale": "..."}
        system_prompt: "You are a content moderator. Be balanced and fair. Output valid JSON only."
        temperature: 0.3
        max_tokens: 500
        output_schema:
          flagged: boolean
          category: string
          severity: string
          rationale: string

    - id: bridge_judgment
      type: variable_set
      title: "Bridge LLM judgment"
      description: |
        Capture the LLM judgment for downstream routing.
      config:
        varName: "judgment"
        varExpr: 'previous_outputs["llm_judge"]["output"]'

    - id: set_is_flagged
      type: variable_set
      title: "Extract flagged flag"
      description: |
        Capture the flagged boolean for the condition check.
      config:
        varName: "is_flagged"
        varExpr: 'inputs["judgment"]["flagged"]'

    - id: check_flagged
      type: condition
      title: "Content not flagged by LLM?"
      description: |
        True when the LLM judge did not flag the content.
      config:
        expression: 'not inputs["is_flagged"]'

    - id: log_approved
      type: log
      title: "Log approved content"
      description: |
        Record that the LLM judge did not flag the content.
      config:
        level: info
        message: "Content approved by LLM judge."

    - id: escalate_human
      type: human_review
      title: "Human review for flagged content"
      description: |
        Pause for human review of flagged borderline content.
      config: {}

    - id: extract_review
      type: variable_set
      title: "Extract human review decision"
      description: |
        Capture the human review resolution.
      config:
        varName: "hitl_resolution"
        varExpr: 'previous_outputs["escalate_human"]["output"]["hitl_resolution"]'

    - id: check_review
      type: condition
      title: "Human review approved?"
      description: |
        True when the human reviewer approved the content.
      config:
        expression: 'previous_outputs["escalate_human"]["output"]["hitl_resolution"] == "approved"'

    - id: log_approved_by_human
      type: log
      title: "Log human-approved content"
      description: |
        Record that human review approved the content.
      config:
        level: info
        message: "Content approved by human review."

    - id: log_rejected
      type: log
      title: "Log rejected content"
      description: |
        Record that human review rejected the content.
      config:
        level: warning
        message: "Content rejected by human review."

  edges:
    - source: set_content
      target: fast_scan
    - source: fast_scan
      target: check_obvious
    # Fast scan passed
    - source: check_obvious
      target: log_clean
      condition: "true"
    # Fast scan failed → LLM judge
    - source: check_obvious
      target: llm_judge
      condition: "false"
    - source: llm_judge
      target: bridge_judgment
    - source: bridge_judgment
      target: set_is_flagged
    - source: set_is_flagged
      target: check_flagged
    # LLM did not flag → approved
    - source: check_flagged
      target: log_approved
      condition: "true"
    # LLM flagged → human review
    - source: check_flagged
      target: escalate_human
      condition: "false"
    - source: escalate_human
      target: extract_review
    - source: extract_review
      target: check_review
    # Human approved
    - source: check_review
      target: log_approved_by_human
      condition: "true"
    # Human rejected
    - source: check_review
      target: log_rejected
      condition: "false"

  budget:
    max_cost_usd: 5.00
    max_wall_time_seconds: 600
    max_iterations: 50
    max_depth: 3

  config: {}
