# flowmanner-secret-leak-scanner.yaml — version 1
#
# Pattern #34: Secret-leak scanner.
#
# Output-side defense blueprint. Runs an LLM to generate output, then scans
# the output for leaked secrets using a guardrail node with secret-detection
# regex. Clean output is logged as safe; detected secrets trigger a fail-closed
# webhook alert and the output is redacted.
#
# blueprint_type: dag
# Product name: flowmanner (double-n, no 'p').

version: 1

name: "flowmanner-secret-leak-scanner"
description: |
  Output-side secret-leak scanner. Generates LLM output, then scans it for
  leaked secrets (API keys, tokens, private keys, connection strings). Clean
  output is logged; detected leaks trigger a webhook alert and are redacted.

blueprint_type: dag

inputs:
  task_prompt:
    type: string
    description: "The task for the LLM to generate output for."
  model:
    type: string
    default: ""
    description: "Optional model override for the generation step."
  alert_webhook_url:
    type: string
    default: ""
    description: "Webhook URL to alert when a secret leak is detected."

definition:
  blueprint_type: dag
  nodes:
    - id: generate_output
      type: llm_call
      title: "Generate LLM output"
      description: |
        Produce text that will be scanned for leaked secrets.
      config:
        model: "{{ inputs.model }}"
        prompt: |
          {{ inputs.task_prompt }}
        system_prompt: "You are a helpful assistant. Provide a concise response."
        temperature: 0.4
        max_tokens: 1000

    - id: scan_output
      type: guardrail
      title: "Scan output for leaked secrets"
      description: |
        Run post-output regex patterns to detect common secret formats.
      config:
        patterns:
          - "AKIA[0-9A-Z]{16}"
          - "gh[pousr]_[A-Za-z0-9]{36}"
          - "-----BEGIN (RSA |EC )?PRIVATE KEY-----"
          - "eyJ[A-Za-z0-9_-]*\\.eyJ[A-Za-z0-9_-]*\\.[A-Za-z0-9_-]*"
          - "postgres(ql)?://[^\\s]+"
          - "sk-[A-Za-z0-9]{20,}"
        useClassifier: false
        guardrailMode: "post"
        onViolation: "block"
        redactWith: "[REDACTED]"

    - id: check_safe
      type: condition
      title: "Is the output safe?"
      description: |
        Branch based on the guardrail safety result.
      config:
        expression: 'previous_outputs["scan_output"]["output"]["safe"]'

    - id: log_safe
      type: log
      title: "Log safe output"
      description: |
        Record that the generated output contained no detected secrets.
      config:
        level: info
        message: "Generated output passed secret-leak scan."

    - id: alert_leak
      type: webhook
      title: "Alert on secret leak"
      description: |
        POST a fail-closed alert when a secret is detected in the output.
      config:
        url: "{{ inputs.alert_webhook_url }}"
        method: POST
        headers:
          Content-Type: "application/json"

    - id: log_blocked
      type: log
      title: "Log blocked secret leak"
      description: |
        Record that the output was blocked due to a detected secret leak.
      config:
        level: error
        message: "Generated output contained a detected secret and was blocked."

  edges:
    - source: generate_output
      target: scan_output
    - source: scan_output
      target: check_safe
    - source: check_safe
      target: log_safe
      condition: "true"
    - source: check_safe
      target: alert_leak
      condition: "false"
    - source: alert_leak
      target: log_blocked

  budget:
    max_cost_usd: 5.00
    max_wall_time_seconds: 600
    max_iterations: 50
    max_depth: 3

  config: {}
