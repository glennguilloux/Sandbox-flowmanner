# flowmanner-provenance-tracker.yaml — version 1
#
# Pattern #47: Provenance tracker.
#
# Renders a provenance/lineage document for a run, validates its schema, and
# stores it immutably in Qdrant. The lineage captures inputs, outputs, node
# execution trace, and timing data. This creates an immutable, queryable
# audit trail for compliance and debugging.
#
# blueprint_type: dag
# Product name: flowmanner (double-n, no 'p').

version: 1

name: "flowmanner-provenance-tracker"
description: |
  Provenance tracker. Fetches run lineage from the API, renders a formatted
  provenance document, validates its schema, and persists it immutably to
  memory.

blueprint_type: dag

inputs:
  run_id:
    type: string
    description: "The run ID to generate provenance for."
  api_base_url:
    type: string
    default: "http://127.0.0.1:8000"
    description: "Flowmanner API base URL."

definition:
  blueprint_type: dag
  nodes:
    - id: collect_lineage
      type: sandbox
      title: "Collect run lineage"
      description: |
        Fetch provenance data and events for the given run from the
        Flowmanner API.
      config:
        template: worker-standard
        shared_workspace: false
        snapshot_before: false
        agent: opencode
        task_prompt: |
          Fetch the provenance data for run {{ inputs.run_id }} from the Flowmanner API.

          Call: {{ inputs.api_base_url }}/api/v2/runs/{{ inputs.run_id }}/provenance

          Also fetch events: {{ inputs.api_base_url }}/api/v2/runs/{{ inputs.run_id }}/events

          Construct a lineage JSON object with:
          - run_id
          - blueprint_id
          - inputs (the run's input parameters)
          - outputs (final outputs)
          - node_trace (list of nodes executed, with timing)
          - total_cost_usd
          - total_duration_seconds
          - timestamp

          If the API is unreachable, output: {"error": "unreachable", "run_id": "{{ inputs.run_id }}"}

    - id: bridge_lineage
      type: variable_set
      title: "Bridge lineage data"
      description: |
        Capture the lineage JSON into a run-scoped variable.
      config:
        varName: "lineage"
        varExpr: 'previous_outputs["collect_lineage"]["output"]'

    - id: render_provenance
      type: template_render
      title: "Render provenance document"
      description: |
        Render a formatted provenance document from the lineage data.
      config:
        template: |
          # Provenance Record

          **Run ID:** {{ inputs.lineage['run_id'] }}
          **Blueprint:** {{ inputs.lineage['blueprint_id'] }}
          **Timestamp:** {{ inputs.lineage['timestamp'] }}

          ## Inputs
          {{ inputs.lineage['inputs'] }}

          ## Outputs
          {{ inputs.lineage['outputs'] }}

          ## Execution Trace
          {{ inputs.lineage['node_trace'] }}

          ## Metrics
          - Total cost: ${{ inputs.lineage['total_cost_usd'] }}
          - Total duration: {{ inputs.lineage['total_duration_seconds'] }}s

    - id: validate_provenance
      type: validate_schema
      title: "Validate provenance schema"
      description: |
        Ensure the lineage document contains the required fields.
      config:
        payload_key: "lineage"
        schema:
          type: object
          required:
            - run_id
            - blueprint_id
            - timestamp
          properties:
            run_id:
              type: string
            blueprint_id:
              type: string
            timestamp:
              type: string
            total_cost_usd:
              type: number
            total_duration_seconds:
              type: number

    - id: check_valid
      type: condition
      title: "Provenance valid?"
      description: |
        True when the provenance document passes schema validation.
      config:
        expression: 'previous_outputs["validate_provenance"]["output"]["valid"]'

    - id: log_invalid
      type: log
      title: "Log invalid provenance"
      description: |
        Record that the provenance document failed schema validation.
      config:
        level: error
        message: "Provenance record failed schema validation for run {{ inputs.run_id }}."

    - id: store_provenance
      type: memory_write
      title: "Store provenance record"
      description: |
        Persist the provenance document to Qdrant for immutable storage.
      config:
        collection: "flowmanner_provenance"
        text: |
          provenance for run {{ inputs.run_id }}
          blueprint: {{ inputs.lineage['blueprint_id'] }}
          timestamp: {{ inputs.lineage['timestamp'] }}
          cost: {{ inputs.lineage['total_cost_usd'] }}
          duration: {{ inputs.lineage['total_duration_seconds'] }}s
        payload:
          schema: provenance_record
          source: flowmanner-provenance-tracker
          run_id: "{{ inputs.run_id }}"

    - id: log_stored
      type: log
      title: "Log provenance stored"
      description: |
        Record that the provenance document was stored.
      config:
        level: info
        message: "Provenance record stored for run {{ inputs.run_id }}."

  edges:
    - source: collect_lineage
      target: bridge_lineage
    - source: bridge_lineage
      target: render_provenance
    - source: render_provenance
      target: validate_provenance
    - source: validate_provenance
      target: check_valid
      condition: "default"
    - source: validate_provenance
      target: log_invalid
      condition: "on_invalid"
    - source: check_valid
      target: store_provenance
      condition: "true"
    - source: check_valid
      target: log_invalid
      condition: "false"
    - source: store_provenance
      target: log_stored

  budget:
    max_cost_usd: 2.00
    max_wall_time_seconds: 300
    max_iterations: 20
    max_depth: 3

  config: {}
