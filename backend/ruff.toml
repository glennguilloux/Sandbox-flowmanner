# Ruff configuration for Flowmanner backend
# Start with critical rules; expand as codebase is cleaned up.
target-version = "py311"
line-length = 120

# Autogenerated alembic migration files have many dict literals (sa.Column
# schema definitions) that ruff-format reformats aggressively, producing
# 4,000+ line diffs on every regeneration. Exclude the alembic versions
# directory — these files are machine-generated and should not be hand-
# polished. Mypy already skips them via pyproject overrides.
extend-exclude = ["alembic/versions/*", "tests/_quarantine/*"]


[lint]
select = [
    "E9",   # runtime errors (syntax errors, IO errors)
    "F63",  # invalid escape sequences
    "F7",   # syntax errors
    "F82",  # undefined names
    "UP",   # pyupgrade — deprecated Python patterns
    "I",    # isort — import sorting
    "C4",   # flake8-comprehensions — better comprehension patterns
    "B",    # flake8-bugbear — common bugs and design problems
    "SIM",  # flake8-simplify — code simplification
    "RUF",  # Ruff-specific rules
    "PERF", # Perflint — performance anti-patterns
    "PT",   # flake8-pytest-style — pytest conventions
    "TCH",  # flake8-type-checking — move type-only imports into TYPE_CHECKING blocks
    "G",    # flake8-logging-format — ban f-strings / .format() in logging calls
]
ignore = [
    "UP015",  # redundant-open-modes — allow explicit 'r' mode for clarity
    "B008",   # function-call-in-default-argument — FastAPI Depends() is standard
    "B904",   # raise-without-from-inside-except — too many, fix incrementally
    "RUF001", # ambiguous-unicode-character-string — false positives on i18n
    "RUF002", # ambiguous-unicode-character-docstring — false positives on i18n
    "RUF003", # ambiguous-unicode-character-comment — false positives (en-dashes etc.)
    "RUF006", # asyncio-dangling-task — intentional fire-and-forget in FastAPI
    "RUF012", # mutable-class-default — Pydantic models use class attributes
    "RUF013", # implicit-optional — too noisy with X | None already in use

    "F821",   # undefined-name — ~97 from TCH refactor (FastAPI/Strawberry runtime deps). Fix per-file.
    "G001",   # logging-string-format-arg — soft-allow (printf %s is acceptable)
    "G002",   # logging-percent-format — soft-allow (printf %s is acceptable)
    # G003 / G004 (logging-f-string) are INTENTIONALLY NOT IGNORED — they
    # fire on every f-string in a logger call. Convention (2026-06-09,
    # bisect step 7): structlog kwargs are preferred (``logger.error(
    # "event_name", key=val)``); printf %s is acceptable; f-strings are
    # banned. See ``scripts/convert_fstring_loggers.py`` for the
    # mechanical converter that produced the current clean state.
]

[lint.per-file-ignores]
# SQLAlchemy models need type imports at runtime for Mapped[...] annotations
# F821 false positives: SQLAlchemy resolves relationship forward refs lazily
"app/models/*.py" = ["F821"]
# Tools use dynamic type references
"app/tools/*.py" = ["F821"]
# Strawberry GraphQL needs runtime imports (Info, JSON, datetime).
# NOTE: the TCH (flake8-type-checking) rules ARE active under the pinned
# ruff v0.6.9 — the claim that TC001/TC002/TC003 were "removed in ruff 0.6"
# is stale; the pre-commit hook flags them. Files below carry pre-existing
# runtime-needed imports (FastAPI route signatures, Pydantic models) that
# cannot move to a TYPE_CHECKING block, so they are per-file-ignored.
"app/api/v2/schema.py" = []
# Path is used at runtime in test fixtures, not just type annotations
"tests/test_integration_manifest_service.py" = ["TCH003"]
# Test files import pytest for fixtures and runtime assertions — moving
# into TYPE_CHECKING blocks would be noisy and break monkeypatch types.
"tests/test_chat_memory_extraction.py" = ["TCH002"]
"tests/test_memory_flywheel_integration.py" = ["TCH002"]
# Request is a FastAPI runtime dependency — cannot move to TYPE_CHECKING
"app/api/v1/sandbox_preview.py" = ["TCH002"]
# AsyncIterator used in return annotation; harmless at top level
"app/integrations/sandboxd_client.py" = ["TCH003"]
# blog_models.py: BlogPost uses Mapped[datetime | None] which SQLAlchemy
# resolves eagerly at mapper-config time, so datetime must be a runtime import
# (not deferrable to TYPE_CHECKING). TC003 (type-checking block) is a
# false positive here. (The repo's active ruff reports TC003/TCxxx codes.)
"app/models/blog_models.py" = ["TCH003"]
# personal_memory.py (v2 Inspector API): User / AsyncSession /
# RequestValidationError are used in FastAPI route signatures (Depends
# annotations) and the Pydantic validation handler — runtime-needed, not
# deferrable to TYPE_CHECKING. These TCH findings pre-exist my GOV-1.6 edit.
"app/api/v2/personal_memory.py" = ["TCH001", "TCH002"]
# personal_memory.py schema module: uuid / datetime back Pydantic model
# fields (from_attributes). They are runtime-needed and pre-exist GOV-1.6.
"app/schemas/personal_memory.py" = ["TCH003"]
# memory_models.py: MemoryEntry.expires_at / reviewed_at / last_used_at use
# Mapped[datetime | None] which SQLAlchemy resolves eagerly at mapper-config
# time, so datetime must be a runtime import (not deferrable to
# TYPE_CHECKING). TC003 is a false positive here — same as blog_models.py.
"app/models/memory_models.py" = ["TCH003"]
# test_memory_entry_lifecycle_fields.py: uses datetime.now(timezone.utc).
# ruff's UP017 prefers datetime.UTC (3.11+), but the pinned uv-built
# cpython-3.11 in this worktree's venv predates datetime.UTC, so the
# UP017 suggestion is not importable here. Keep timezone.utc (valid on all
# 3.x) and silence the lint finding rather than shipping a test that fails
# in the project's own test runner.
"app/tests/test_memory_entry_lifecycle_fields.py" = ["UP017"]
