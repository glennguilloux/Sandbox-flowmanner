# flowmanner-react-tool-loop.yaml — version 1
#
# Pattern #29: ReAct tool-loop.
#
# ReAct (Reason-Act-Observe) tool-loop agent. Uses a LOOP node where each
# iteration reasons about the current state, acts via a sandbox, and checks
# if done. Bounded by max_iterations and a variable_set step counter. Exits
# when the LLM declares "FINAL ANSWER:" or the step budget is exhausted.
#
# blueprint_type: dag
# Product name: flowmanner (double-n, no 'p').

version: 1

name: "flowmanner-react-tool-loop"
description: |
  ReAct tool-loop. Iteratively reasons about a task, acts through an
  egress-capable sandbox, observes the result, and exits when the LLM
  declares a final answer or the iteration cap is reached.

blueprint_type: dag

inputs:
  task_prompt:
    type: string
    description: "The task for the ReAct agent to solve."
  model:
    type: string
    default: ""
    description: "Optional model override."

definition:
  blueprint_type: dag
  nodes:
    - id: init_state
      type: variable_set
      title: "Initialize step counter"
      description: |
        Seed the step counter used by the loop body.
      config:
        varName: "step_count"
        varValue: 0

    - id: react_loop
      type: loop
      title: "ReAct reasoning-acting loop"
      description: |
        Iterate reason → act → check done until an answer is found or the
        iteration cap is reached.
      config:
        body:
          - reason
          - act
          - check_done
          - increment_step
        max_iterations: 10
        stop_condition: 'previous_outputs["check_done"]["value"]'

    - id: reason
      type: llm_call
      title: "Reason and decide next action"
      description: |
        Analyze the task and previous action result, then decide the next
        action or provide the final answer.
      config:
        model: "{{ inputs.model }}"
        prompt: |
          You are a ReAct agent. Task: {{ inputs.task_prompt }}

          Step: {{ inputs.step_count }}

          {% if inputs.step_count > 0 %}
          Previous action result: {{ previous_outputs["act"]["output"] }}
          {% endif %}

          Reason about the current state and decide the next action.
          If you have the final answer, start with "FINAL ANSWER:" followed by the answer.
          Otherwise, describe the next action to take.
        system_prompt: "You are a ReAct agent. Be concise."
        temperature: 0.4
        max_tokens: 800

    - id: act
      type: sandbox
      title: "Execute proposed action"
      description: |
        Run the proposed action in an egress-capable sandbox.
      config:
        template: worker-standard
        shared_workspace: false
        snapshot_before: false
        agent: opencode
        model: "{{ inputs.model }}"
        task_prompt: |
          Execute the following action:

          {{ previous_outputs["reason"]["output"] }}

          Return a concise summary of what you did and the result.
          If no action is needed (the reason says "FINAL ANSWER:"), simply
          echo the final answer.

    - id: check_done
      type: condition
      title: "Answer found?"
      description: |
        Exit the loop if the reasoning step produced a final answer.
      config:
        expression: '"FINAL ANSWER:" in previous_outputs["reason"]["output"]'

    - id: increment_step
      type: variable_set
      title: "Increment step counter"
      description: |
        Track how many reasoning-acting steps have run.
      config:
        varName: "step_count"
        varExpr: 'inputs["step_count"] + 1'

    - id: summarize_run
      type: llm_call
      title: "Summarize final answer"
      description: |
        Produce a polished final answer from the reasoning output.
      config:
        model: "{{ inputs.model }}"
        prompt: |
          Produce a clear final answer for the following task.

          Task: {{ inputs.task_prompt }}
          Reasoning output: {{ previous_outputs["reason"]["output"] }}

          Return the final answer.
        system_prompt: "You are a helpful assistant."
        temperature: 0.3
        max_tokens: 800

    - id: log_result
      type: log
      title: "Log final result"
      description: |
        Record that the ReAct loop produced a final answer.
      config:
        level: info
        message: "ReAct loop completed after {{ inputs.step_count }} steps."

  edges:
    - source: init_state
      target: react_loop
    # Loop body execution order
    - source: react_loop
      target: reason
    - source: reason
      target: act
    - source: act
      target: check_done
    # Exit condition: true = answer found → exit loop
    - source: check_done
      target: summarize_run
      condition: "true"
    # Continue: false = keep iterating
    - source: check_done
      target: increment_step
      condition: "false"
    - source: summarize_run
      target: log_result

  budget:
    max_cost_usd: 5.00
    max_wall_time_seconds: 900
    max_iterations: 50
    max_depth: 3

  config: {}
