[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = [
    "--ignore=tests/smoke",
    "--ignore=tests/chaos",
    "--ignore=tests/_quarantine",
    "-p", "no:flask",
]
markers = [
    "integration: marks tests as integration tests (deselect with '-m \"not integration\"')",
    "smoke: smoke tests (excluded from default runs; run with `pytest tests/smoke/`)",
    "chaos: chaos tests (excluded from default runs; run with `pytest tests/chaos/`)",
    "sanity: sanity tests (per-area markers: sanity_auth, sanity_chat, …)",
    "sanity_auth: sanity tests for the auth area",
    "sanity_chat: sanity tests for the chat area",
    "sanity_missions: sanity tests for the missions area",
    "sanity_byok: sanity tests for the BYOK area",
    "sanity_websocket: sanity tests for the WebSocket area",
    "sanity_frontend: sanity tests for the frontend area",
    "regression: regression tests; defend against a specific past bug (§5)",
    "flaky: quarantined flaky test; does not block merge (§10.4)",
    "requires_postgres: needs a live PostgreSQL connection (auto-skipped when unreachable)",
]

# ── mypy ─────────────────────────────────────────────────────────────────────
# Migrations use alembic's runtime-injected `op` context proxy; mypy cannot
# see this attribute statically (caused ~220 [attr-defined] errors across
# every file in app/migrations/versions/). Suppress that code in the subtree.
# (CLI args from .pre-commit-config.yaml: --ignore-missing-imports
# --no-strict-optional.)

[tool.mypy]
ignore_missing_imports = true
no_strict_optional = true
# Load the SQLAlchemy mypy plugin so async Result[Tuple[...]] generics resolve
# correctly (e.g. .scalar_one_or_none() -> Entity | None). Without it mypy
# mis-infers ORM Result rows as tuples (~180 spurious attr-defined/arg-type/
# assignment errors across app/). Plugin is enabled via this config key (the
# --plugins CLI flag does not exist in mypy 1.8-1.11). Requires mypy >= 1.9
# (CI pins mypy==1.11.2) for the plugin key to load.
plugins = ["sqlalchemy.ext.mypy.plugin"]

[[tool.mypy.overrides]]
module = "app.migrations.versions.*"
disable_error_code = ["attr-defined"]
