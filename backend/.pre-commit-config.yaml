# .pre-commit-config.yaml for Flowmanner Backend
# LibCST tools: run manually with `python apps/backend/scripts/flowmanner_analyzer.py apps/backend/app/`

repos:
  # --- Ruff (linter + formatter) ---
  # Ruff-format is a near-drop-in for black and is used in place of black
  # everywhere in this repo.  See backend/ruff.toml for the lint config.
  # (Removed: black — having both ruff-format AND black on the same files
  # causes an infinite reformat loop because the two formatters disagree
  # on a small set of edge cases.  Re-introducing black would require
  # aligning its config with ruff-format exactly.  2026-06-10.)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Bumped from v0.8.6: PT028 (pytest-parameter-with-default-argument) was
    # added in ruff 0.9.0; the old pin failed with "Unknown rule selector: PT028"
    # because backend/ruff.toml selects the "PT" group.
    rev: v0.14.5
    hooks:
      # Linter (replaces flake8, isort, parts of pylint)
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # Formatter (the only Python formatter in this repo)
      - id: ruff-format

  # --- Custom: reject deprecated Pydantic class Config pattern ---
  - repo: local
    hooks:
      - id: pydantic-config-check
        name: Check for deprecated Pydantic class Config
        entry: python scripts/check_pydantic_config.py
        language: system
        files: '^app/.*\.py$'
        pass_filenames: true

  # --- mypy (static type checking) ---
  # REMOVED from pre-commit 2026-06-10: mypy reports 301 pre-existing errors
  # across 93 files (53 call-arg, 18 attr-defined, 14 union-attr, 12 assignment,
  # 11 misc, 9 override/has-type, etc.). These are deep type issues, not trivial
  # config fixes — fixing them is a multi-day refactor. Running mypy on every
  # commit blocks every commit (forces --no-verify), so it has been moved to
  # CI-only. See backend/pyproject.toml for the mypy config (still used in CI).
  # To run mypy locally during development: `cd backend && mypy app/`.
