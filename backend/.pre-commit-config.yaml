# .pre-commit-config.yaml for Flowmanner Backend
# LibCST tools: run manually with `python apps/backend/scripts/flowmanner_analyzer.py apps/backend/app/`

repos:
  # --- Ruff (linter + formatter) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Bumped from v0.8.6: PT028 (pytest-parameter-with-default-argument) was
    # added in ruff 0.9.0; the old pin failed with "Unknown rule selector: PT028"
    # because backend/ruff.toml selects the "PT" group.
    rev: v0.14.5
    hooks:
      # Linter (replaces flake8, isort, parts of pylint)
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # Formatter (alternative to black)
      - id: ruff-format

  # --- Black (kept for compatibility / team preference) ---
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3

  # --- Custom: reject deprecated Pydantic class Config pattern ---
  - repo: local
    hooks:
      - id: pydantic-config-check
        name: Check for deprecated Pydantic class Config
        entry: python scripts/check_pydantic_config.py
        language: system
        files: '^app/.*\.py$'
        pass_filenames: true

  # --- mypy (static type checking) ---
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        # Restrict to backend/app/ so mypy doesn't scan the entire repo:
        #  - sdk-python/ is a generated SDK with its own (incompatible) type
        #    expectations
        #  - a top-level tests/ dir collides with backend/tests/ and produces
        #    "Duplicate module named 'tests'" errors
        #  - the metrics.py:53 phantom only manifests when mypy is asked to
        #    scan files outside backend/app/
        files: ^backend/app/.*\.py$
        # No explicit path arg — the files: filter above is the only source
        # of file paths. Adding `backend/app` here causes a
        # "Duplicate module named 'app'" error because mypy sees the same
        # files via two paths (the filter list + the explicit arg).
        # --disable-error-code=annotation-unchecked: suppresses the
        # "By default the bodies of untyped functions are not checked"
        # note (145 instances). These are untyped functions, not real
        # bugs — annotating them is a separate project. The note is
        # informational and harmless.
        args: [--ignore-missing-imports, --no-strict-optional, --disable-error-code=annotation-unchecked]
        additional_dependencies:
          - pydantic>=2.0
          - types-requests
          - types-redis
