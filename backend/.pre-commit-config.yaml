repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^backend/app/.*\.py$
        # The mypy hook runs in an isolated mirrors-mypy venv that does NOT
        # include project deps. pyproject.toml sets
        #   plugins = ["sqlalchemy.ext.mypy.plugin"]
        # so mypy imports that plugin at startup — which needs `sqlalchemy`
        # present in THIS venv, not just the project venv. Without it the hook
        # dies with "Error importing plugin sqlalchemy.ext.mypy.plugin:
        # No module named 'sqlalchemy'" and silently fails every backend
        # commit (blind gate). Adding it here is the root-cause fix.
        additional_dependencies: [sqlalchemy==2.0.46]
        # Pass files only — do NOT also pass `backend/app` as a positional
        # arg or mypy sees each file twice (once as `app/foo.py` from
        # pre-commit's file list, once as `backend/app/foo.py` from the
        # explicit path) and aborts with
        # "Duplicate module named 'app.tasks.X' (also at ...)".
        #
        # --follow-imports=silent makes mypy only type-check the file(s)
        # pre-commit passes (the changed file) and silently skip type errors
        # in any imported modules.  Without this, every commit fails on
        # pre-existing type errors in transitive imports (~79 across the
        # codebase as of 2026-06-19), making pre-commit mypy useless as a
        # commit gate.  Per-file mypy runs in CI / Makefile catch the rest.
        args: [--ignore-missing-imports, --no-strict-optional, --follow-imports=silent]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: guard-llm-success
        name: guard-llm-success
        description: Fail if any LLM route_request result is read for content without a success check / normalize_llm_result guard.
        entry: python backend/scripts/guard_llm_success.py app
        language: system
        pass_filenames: false
        files: ^backend/app/.*\.py$
      - id: guard-alembic-drift
        name: guard-alembic-drift
        description: Fail if an autogenerate probe would drop a table not on the explicit allow-list (prevents destroying live tables).
        entry: python backend/scripts/guard_alembic_drift.py
        language: system
        pass_filenames: false
        files: ^backend/alembic/.*$
