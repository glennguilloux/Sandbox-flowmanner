# .pre-commit-config.yaml for Flowmanner Backend
# LibCST tools: run manually with `python apps/backend/scripts/flowmanner_analyzer.py apps/backend/app/`

repos:
  # --- Ruff (linter + formatter) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      # Linter (replaces flake8, isort, parts of pylint)
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # Formatter (alternative to black)
      - id: ruff-format

  # --- Black (kept for compatibility / team preference) ---
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3

  # --- Custom: reject deprecated Pydantic class Config pattern ---
  - repo: local
    hooks:
      - id: pydantic-config-check
        name: Check for deprecated Pydantic class Config
        entry: python scripts/check_pydantic_config.py
        language: system
        files: '^app/.*\.py$'
        pass_filenames: true

  # --- mypy (static type checking) ---
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-strict-optional]
        additional_dependencies:
          - pydantic>=2.0
          - types-requests
          - types-redis
