# SearXNG Docker Compose Configuration
# Add this to your main docker-compose.yml

version: '3.8'

services:
  searxng:
    image: searxng/searxng:latest
    container_name: workflow-searxng
    ports:
      - "55510:8080"
    volumes:
      - ./searxng_config.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:55510/
      - SEARXNG_SECRET=change_this_to_a_secure_random_string
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - workflow-network

networks:
  workflow-network:
    external: true
