# flowmanner-model-cascade.yaml — version 1
#
# Pattern #30: Model cascade.
#
# Cost-optimizing model cascade. Tries a cheap/fast model first, uses
# llm_eval to check confidence/quality, and only escalates to an expensive
# model if the cheap model's output is below threshold. The routing decision
# is persisted to Qdrant via memory_write to build a routing prior over time.
#
# blueprint_type: dag
# Product name: flowmanner (double-n, no 'p').

version: 1

name: "flowmanner-model-cascade"
description: |
  Cost-optimizing model cascade. Tries a cheap model first, judges the
  output quality, and only invokes a strong model when confidence is below
  the threshold. The routing decision is persisted to memory to build a
  routing prior.

blueprint_type: dag

inputs:
  task_prompt:
    type: string
    description: "The task to complete."
  cheap_model:
    type: string
    default: "openrouter/meta-llama/llama-3.3-70b-instruct"
    description: "Cheap/fast model for the first attempt."
  strong_model:
    type: string
    default: "openrouter/anthropic/claude-3.5-sonnet"
    description: "Expensive/strong model for escalation."
  threshold:
    type: integer
    default: 75
    description: "Minimum confidence score to accept the cheap model's output."

definition:
  blueprint_type: dag
  nodes:
    - id: try_cheap
      type: llm_call
      title: "Try cheap model"
      description: |
        Run the task with the cheap, fast model.
      config:
        model: "{{ inputs.cheap_model }}"
        prompt: |
          Complete the following task concisely.

          Task: {{ inputs.task_prompt }}
        system_prompt: "You are a helpful assistant. Be concise and accurate."
        temperature: 0.3
        max_tokens: 1000

    - id: bridge_cheap
      type: variable_set
      title: "Bridge cheap output"
      description: |
        Capture the cheap model output for confidence evaluation.
      config:
        varName: "cheap_output"
        varExpr: 'previous_outputs["try_cheap"]["output"]'

    - id: judge_confidence
      type: llm_eval
      title: "Judge cheap output confidence"
      description: |
        Score the cheap output on a 0-100 scale to decide whether to
        escalate to the strong model.
      config:
        prompt: |
          You are evaluating the quality and confidence of an LLM output.
          Score it from 0 to 100 where:
          - 90-100: Excellent, fully correct and complete
          - 70-89: Good, minor issues
          - 50-69: Acceptable but with notable gaps
          - 0-49: Poor, needs re-generation with a stronger model

          Output to evaluate: {{ inputs.cheap_output }}

          Return JSON: {"score": N, "issues": "..."}
        system_prompt: "You are a quality evaluator. Output valid JSON only."
        temperature: 0.2
        max_tokens: 400
        output_schema:
          score: integer
          issues: string

    - id: bridge_score
      type: variable_set
      title: "Bridge confidence score"
      description: |
        Capture the numeric confidence score for the condition check.
      config:
        varName: "confidence_score"
        varExpr: 'previous_outputs["judge_confidence"]["output"]["score"]'

    - id: check_confidence
      type: condition
      title: "Confidence sufficient?"
      description: |
        True when the cheap model's confidence score meets the threshold.
      config:
        expression: 'inputs["confidence_score"] >= inputs["threshold"]'

    - id: log_cached
      type: log
      title: "Log cheap model accepted"
      description: |
        Record that the cheap model output was accepted.
      config:
        level: info
        message: "Cheap model accepted with confidence score {{ inputs.confidence_score }}."

    - id: log_done
      type: log
      title: "Log cascade finished"
      description: |
        Record that the model cascade completed.
      config:
        level: info
        message: "Model cascade completed."

    - id: try_strong
      type: llm_call
      title: "Try strong model"
      description: |
        Escalate to the strong model when cheap output is insufficient.
      config:
        model: "{{ inputs.strong_model }}"
        prompt: |
          Complete the following task with high quality and completeness.

          Task: {{ inputs.task_prompt }}
        system_prompt: "You are a helpful assistant. Provide a thorough answer."
        temperature: 0.3
        max_tokens: 1500

    - id: bridge_strong
      type: variable_set
      title: "Bridge strong output"
      description: |
        Capture the strong model output for the routing prior.
      config:
        varName: "strong_output"
        varExpr: 'previous_outputs["try_strong"]["output"]'

    - id: record_routing
      type: memory_write
      title: "Record routing decision"
      description: |
        Persist the routing decision to build a routing prior.
      config:
        collection: "flowmanner_routing_prior"
        text: |
          task: {{ inputs.task_prompt }}
          cheap_model: {{ inputs.cheap_model }}
          cheap_score: {{ inputs.confidence_score }}
          escalated: true
          strong_model: {{ inputs.strong_model }}
        payload:
          schema: routing_prior
          source: flowmanner-model-cascade

    - id: log_escalated
      type: log
      title: "Log strong model used"
      description: |
        Record that the strong model was used.
      config:
        level: info
        message: "Escalated to strong model after cheap confidence score {{ inputs.confidence_score }}."

  edges:
    - source: try_cheap
      target: bridge_cheap
    - source: bridge_cheap
      target: judge_confidence
    - source: judge_confidence
      target: bridge_score
    - source: bridge_score
      target: check_confidence
    - source: check_confidence
      target: log_cached
      condition: "true"
    - source: check_confidence
      target: try_strong
      condition: "false"
    - source: log_cached
      target: log_done
    - source: try_strong
      target: bridge_strong
    - source: bridge_strong
      target: record_routing
    - source: record_routing
      target: log_escalated

  budget:
    max_cost_usd: 5.00
    max_wall_time_seconds: 600
    max_iterations: 20
    max_depth: 3

  config: {}
