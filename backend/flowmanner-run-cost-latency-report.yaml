# flowmanner-run-cost-latency-report.yaml — version 1
#
# Pattern #37: Run cost/latency report.
#
# Aggregates run cost and latency metrics from the Flowmanner API, renders
# them into a formatted report via template_render, validates the report data
# shape, stores it in Qdrant for historical tracking, and optionally publishes
# via webhook. The sandbox is the only node with network egress, so it calls
# the API.
#
# blueprint_type: dag
# Product name: flowmanner (double-n, no 'p').

version: 1

name: "flowmanner-run-cost-latency-report"
description: |
  Run cost/latency report. Fetches recent run metrics from the Flowmanner
  API, renders a markdown report, validates the metrics schema, persists
  the report to memory, and optionally publishes it via webhook.

blueprint_type: dag

inputs:
  api_base_url:
    type: string
    default: "http://127.0.0.1:8000"
    description: "Flowmanner API base URL."
  publish_webhook_url:
    type: string
    default: ""
    description: "Optional webhook to publish the report."

definition:
  blueprint_type: dag
  nodes:
    - id: collect_metrics
      type: sandbox
      title: "Collect run metrics"
      description: |
        Query the Flowmanner API for recent run metrics and aggregate
        cost, latency, token usage, and status counts.
      config:
        template: worker-standard
        shared_workspace: false
        snapshot_before: false
        agent: opencode
        task_prompt: |
          Query the Flowmanner API for recent run metrics and aggregate them.

          Use curl to call: {{ inputs.api_base_url }}/api/v2/runs?limit=50

          Aggregate:
          - Total cost (sum of cost_usd)
          - Average latency (mean of duration_seconds)
          - P95 latency
          - Total tokens consumed
          - Run count by status (completed, failed, running)

          Output a JSON object with these keys. If the API is unreachable,
          output: {"error": "api_unreachable", "runs": []}

    - id: bridge_metrics
      type: variable_set
      title: "Bridge metrics"
      description: |
        Capture the metrics JSON into a run-scoped variable.
      config:
        varName: "metrics"
        varExpr: 'previous_outputs["collect_metrics"]["output"]'

    - id: render_report
      type: template_render
      title: "Render report"
      description: |
        Render a markdown report from the aggregated metrics.
      config:
        template: |
          ## Run Metrics Report

          **Generated:** {{ inputs.metrics['timestamp'] }}
          **Period:** Last {{ inputs.metrics['run_count'] }} runs

          ### Cost
          - Total: ${{ inputs.metrics['total_cost'] }}
          - Average per run: ${{ inputs.metrics['avg_cost'] }}

          ### Latency
          - Average: {{ inputs.metrics['avg_latency'] }}s
          - P95: {{ inputs.metrics['p95_latency'] }}s

          ### Volume
          - Total runs: {{ inputs.metrics['run_count'] }}
          - Total tokens: {{ inputs.metrics['total_tokens'] }}
          - Status breakdown: {{ inputs.metrics['status_breakdown'] }}

    - id: validate_report
      type: validate_schema
      title: "Validate metrics schema"
      description: |
        Ensure the collected metrics contain the expected keys.
      config:
        payload_key: "metrics"
        schema:
          type: object
          required:
            - total_cost
            - avg_latency
            - run_count
          properties:
            total_cost:
              type: number
            avg_latency:
              type: number
            run_count:
              type: integer

    - id: check_valid
      type: condition
      title: "Metrics valid?"
      description: |
        Branch based on whether the metrics passed schema validation.
      config:
        expression: 'previous_outputs["validate_report"]["output"]["valid"]'

    - id: log_invalid
      type: log
      title: "Log invalid metrics"
      description: |
        Record that the collected metrics did not match the expected schema.
      config:
        level: error
        message: "Run metrics failed schema validation."

    - id: store_report
      type: memory_write
      title: "Store report"
      description: |
        Persist the report to Qdrant for historical tracking.
      config:
        collection: "flowmanner_reports"
        text: |
          {{ previous_outputs["render_report"]["output"] }}
        payload:
          schema: run_metrics_report
          source: flowmanner-run-cost-latency-report

    - id: publish_report
      type: webhook
      title: "Publish report"
      description: |
        Optionally publish the report via webhook.
      config:
        url: "{{ inputs.publish_webhook_url }}"
        method: POST
        headers:
          Content-Type: "application/json"

    - id: log_done
      type: log
      title: "Log report published"
      description: |
        Record that the report was stored and published.
      config:
        level: info
        message: "Run cost/latency report stored and published."

  edges:
    - source: collect_metrics
      target: bridge_metrics
    - source: bridge_metrics
      target: render_report
    - source: render_report
      target: validate_report
    - source: validate_report
      target: check_valid
      condition: "default"
    - source: validate_report
      target: log_invalid
      condition: "on_invalid"
    - source: check_valid
      target: store_report
      condition: "true"
    - source: check_valid
      target: log_invalid
      condition: "false"
    - source: store_report
      target: publish_report
    - source: publish_report
      target: log_done

  budget:
    max_cost_usd: 5.00
    max_wall_time_seconds: 600
    max_iterations: 20
    max_depth: 3

  config: {}
