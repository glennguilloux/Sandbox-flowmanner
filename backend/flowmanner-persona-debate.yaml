# flowmanner-persona-debate.yaml — version 1
#
# Pattern #48: Multi-persona deliberation.
#
# Splits across N expert personas, each reasoning about the same question from
# their domain perspective. A merge collects all positions, then an llm_eval
# judge synthesizes the best answer from the debate. The winning position is
# persisted to Qdrant.
#
# blueprint_type: dag
# Product name: flowmanner (double-n, no 'p').

version: 1

name: "flowmanner-persona-debate"
description: |
  Multi-persona deliberation blueprint. Splits across expert personas, each
  argues from their perspective, then an LLM judge synthesizes the best
  answer from the debate and persists the outcome to memory.

blueprint_type: dag

inputs:
  topic:
    type: string
    description: "The debate topic or question."
  model:
    type: string
    default: ""
    description: "Optional model override for persona arguments."

definition:
  blueprint_type: dag
  nodes:
    - id: set_personas
      type: variable_set
      title: "Set persona list"
      description: |
        Define the personas that will participate in the debate.
      config:
        varName: "personas"
        varValue:
          - id: "optimist"
            name: "Optimist"
            perspective: "Focus on upside potential, best-case scenarios, and growth opportunities"
          - id: "pessimist"
            name: "Risk Analyst"
            perspective: "Focus on downside risks, failure modes, and worst-case scenarios"
          - id: "pragmatist"
            name: "Pragmatist"
            perspective: "Focus on practical implementation, cost-benefit, and real-world constraints"
          - id: "ethicist"
            name: "Ethicist"
            perspective: "Focus on ethical implications, fairness, and societal impact"

    - id: split_personas
      type: split
      title: "Split across personas"
      description: |
        Create one parallel branch for each persona.
      config:
        splitOn: "inputs.personas"
        mode: "item"

    - id: argue_position
      type: llm_call
      title: "Argue from persona perspective"
      description: |
        Each persona argues its position on the debate topic.
      config:
        model: "{{ inputs.model }}"
        prompt: |
          You are: {{ input }}

          Debate topic: {{ inputs.topic }}

          Argue your position on this topic from your assigned perspective.
          Be concise but thorough. Present your strongest argument.

          Start with: "As the {{ input }}, I argue that..."
        system_prompt: "You are an expert debater. Be persuasive and specific."
        temperature: 0.6
        max_tokens: 800

    - id: merge_arguments
      type: merge
      title: "Merge persona arguments"
      description: |
        Gather all persona arguments.
      config:
        mergeStrategy: "concat"

    - id: bridge_arguments
      type: variable_set
      title: "Bridge merged arguments"
      description: |
        Capture the merged arguments for the judge.
      config:
        varName: "arguments"
        varExpr: 'previous_outputs["merge_arguments"]["merged"]'

    - id: judge_winner
      type: llm_eval
      title: "Synthesize debate"
      description: |
        Synthesize all persona positions into a single recommendation.
      config:
        model: "{{ inputs.model }}"
        prompt: |
          You are the moderator of a multi-persona debate. Synthesize the best
          answer from all positions below.

          Topic: {{ inputs.topic }}

          All arguments:
          {{ inputs.arguments }}

          Produce a final synthesis that:
          1. Identifies the strongest point from each persona
          2. Notes where personas agreed or disagreed
          3. Delivers a balanced final recommendation

          Return JSON: {"winner": "<persona_id>", "synthesis": "...",
          "key_points": ["..."], "recommendation": "..."}
        system_prompt: "You are a debate moderator. Output valid JSON only."
        temperature: 0.3
        max_tokens: 1000
        output_schema:
          winner: string
          synthesis: string
          key_points: array
          recommendation: string

    - id: bridge_verdict
      type: variable_set
      title: "Bridge verdict"
      description: |
        Capture the judge's synthesis for logging and memory.
      config:
        varName: "verdict"
        varExpr: 'previous_outputs["judge_winner"]["output"]["synthesis"]'

    - id: record_debate
      type: memory_write
      title: "Record debate outcome"
      description: |
        Persist the debate outcome to shared memory.
      config:
        collection: "flowmanner_memory"
        text: |
          Debate topic: {{ inputs.topic }}
          Winner: {{ inputs.verdict }}
        payload:
          schema: debate_record
          source: flowmanner-persona-debate
          topic: "{{ inputs.topic }}"

    - id: log_result
      type: log
      title: "Log debate result"
      description: |
        Record that the persona debate completed.
      config:
        level: info
        message: "Persona debate completed for topic: {{ inputs.topic }}"

  edges:
    - source: set_personas
      target: split_personas
    - source: split_personas
      target: argue_position
    - source: argue_position
      target: merge_arguments
    - source: merge_arguments
      target: bridge_arguments
    - source: bridge_arguments
      target: judge_winner
    - source: judge_winner
      target: bridge_verdict
    - source: bridge_verdict
      target: record_debate
    - source: record_debate
      target: log_result

  budget:
    max_cost_usd: 5.00
    max_wall_time_seconds: 600
    max_iterations: 30
    max_depth: 3

  config: {}
