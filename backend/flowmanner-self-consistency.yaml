# flowmanner-self-consistency.yaml — version 1
#
# Pattern #49: Self-consistency voting.
#
# Samples the same prompt N times in parallel using split, then uses an
# llm_eval to cluster outputs by similarity and identify the majority answer.
# If there is no clear majority, a tie-breaker llm_eval selects the best answer.
# The consensus answer is persisted to Qdrant.
#
# blueprint_type: dag
# Product name: flowmanner (double-n, no 'p').

version: 1

name: "flowmanner-self-consistency"
description: |
  Self-consistency voting blueprint. Samples the same prompt N times in
  parallel, uses an LLM to find a majority cluster, and either logs the
  consensus or breaks the tie. The consensus is persisted to memory.

blueprint_type: dag

inputs:
  question:
    type: string
    description: "The question to sample and find consensus on."
  model:
    type: string
    default: ""
    description: "Optional model override."

definition:
  blueprint_type: dag
  nodes:
    - id: set_samples
      type: variable_set
      title: "Set sample indices"
      description: |
        Create the list of parallel sample indices.
      config:
        varName: "sample_indices"
        varValue: [0, 1, 2, 3, 4]

    - id: split_samples
      type: split
      title: "Split into parallel samples"
      description: |
        Create one branch for each consistency sample.
      config:
        splitOn: "inputs.sample_indices"
        mode: "item"

    - id: generate_sample
      type: llm_call
      title: "Generate sample answer"
      description: |
        Generate one answer sample with high temperature for diversity.
      config:
        model: "{{ inputs.model }}"
        prompt: |
          Answer the following question. Be concise.

          Question: {{ inputs.question }}
        system_prompt: "You are a helpful assistant. Provide a direct answer."
        temperature: 0.8
        max_tokens: 500

    - id: merge_samples
      type: merge
      title: "Merge sample answers"
      description: |
        Gather all parallel sample outputs.
      config:
        mergeStrategy: "concat"

    - id: bridge_samples
      type: variable_set
      title: "Bridge sample list"
      description: |
        Capture the merged samples for majority analysis.
      config:
        varName: "samples"
        varExpr: 'previous_outputs["merge_samples"]["merged"]'

    - id: find_majority
      type: llm_eval
      title: "Find majority cluster"
      description: |
        Cluster the samples by semantic similarity and identify a majority.
      config:
        model: "{{ inputs.model }}"
        prompt: |
          You are finding the majority answer from multiple samples of the same question.

          Question: {{ inputs.question }}

          Samples:
          {{ inputs.samples }}

          Cluster the outputs by semantic similarity. Identify if there is a clear
          majority (more than 50% of samples agree).

          Return JSON: {"has_majority": true/false, "majority_answer": "...",
          "confidence": 0-100, "clusters": [["sample1", "sample2"], ["sample3"]]}
        system_prompt: "You are a consistency analyzer. Output valid JSON only."
        temperature: 0.2
        max_tokens: 800
        output_schema:
          has_majority: boolean
          majority_answer: string
          confidence: integer
          clusters: array

    - id: bridge_majority
      type: variable_set
      title: "Bridge majority result"
      description: |
        Capture the majority result for the condition check.
      config:
        varName: "majority"
        varExpr: 'previous_outputs["find_majority"]["output"]["has_majority"]'

    - id: check_majority
      type: condition
      title: "Clear majority found?"
      description: |
        True when a clear majority answer was identified.
      config:
        expression: 'inputs["majority"]'

    - id: log_consensus
      type: log
      title: "Log consensus answer"
      description: |
        Record the majority consensus answer.
      config:
        level: info
        message: "Consensus answer found."

    - id: store_consensus
      type: memory_write
      title: "Store consensus answer"
      description: |
        Persist the majority consensus answer to memory.
      config:
        collection: "flowmanner_memory"
        text: |
          Question: {{ inputs.question }}
          Consensus answer: {{ previous_outputs["find_majority"]["output"]["majority_answer"] }}
        payload:
          schema: self_consensus_record
          source: flowmanner-self-consistency

    - id: break_tie
      type: llm_eval
      title: "Break tie"
      description: |
        Select the best answer when no clear majority exists.
      config:
        model: "{{ inputs.model }}"
        prompt: |
          No clear majority was found across these samples. Select the best answer.

          Question: {{ inputs.question }}

          Samples:
          {{ inputs.samples }}

          Return JSON: {"best_answer": "...", "rationale": "..."}
        system_prompt: "You are a tie-breaker judge. Output valid JSON only."
        temperature: 0.2
        max_tokens: 500
        output_schema:
          best_answer: string
          rationale: string

    - id: log_tiebreak
      type: log
      title: "Log tiebreak answer"
      description: |
        Record the tie-breaker answer.
      config:
        level: info
        message: "Tie-breaker selected the best answer."

    - id: store_tiebreak
      type: memory_write
      title: "Store tiebreak answer"
      description: |
        Persist the tie-breaker answer to memory.
      config:
        collection: "flowmanner_memory"
        text: |
          Question: {{ inputs.question }}
          Tiebreak answer: {{ previous_outputs["break_tie"]["output"]["best_answer"] }}
        payload:
          schema: self_consensus_record
          source: flowmanner-self-consistency

  edges:
    - source: set_samples
      target: split_samples
    - source: split_samples
      target: generate_sample
    - source: generate_sample
      target: merge_samples
    - source: merge_samples
      target: bridge_samples
    - source: bridge_samples
      target: find_majority
    - source: find_majority
      target: bridge_majority
    - source: bridge_majority
      target: check_majority
    - source: check_majority
      target: log_consensus
      condition: "true"
    - source: check_majority
      target: break_tie
      condition: "false"
    - source: log_consensus
      target: store_consensus
    - source: break_tie
      target: store_tiebreak

  budget:
    max_cost_usd: 5.00
    max_wall_time_seconds: 600
    max_iterations: 30
    max_depth: 3

  config: {}
