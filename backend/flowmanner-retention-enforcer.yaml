# flowmanner-retention-enforcer.yaml — version 1
#
# Pattern #46: Data-retention enforcer (DAG with dual approval).
#
# Reads memory entries older than a TTL, requires two independent approval
# gates (dual HITL), then deletes the entries via sandbox egress to the
# Qdrant REST API. Implements the seeded "GDPR Erasure" template as a
# running blueprint.
#
# blueprint_type: dag
# Product name: flowmanner (double-n, no 'p').

version: 1

name: "flowmanner-retention-enforcer"
description: |
  Data-retention enforcer blueprint. Finds memory entries older than the
  configured retention period, requires two independent human approvals,
  and deletes the entries via sandbox egress to the Qdrant REST API.

blueprint_type: dag

inputs:
  collection:
    type: string
    default: "flowmanner_memory"
  retention_days:
    type: integer
    default: 90
  alert_webhook_url:
    type: string
    default: ""
    description: "Optional webhook to notify when deletions occur."

definition:
  blueprint_type: dag
  nodes:
    - id: read_stale
      type: memory_read
      title: "Read stale memory entries"
      description: |
        Retrieve memory entries older than the retention TTL. The query
        is semantic; filtering by age is completed in the sandbox.
      config:
        collection: "{{ inputs.collection }}"
        query: "retention review"
        topK: 10

    - id: bridge_stale
      type: variable_set
      title: "Bridge stale entries into inputs"
      description: |
        Capture the candidate entries for deletion so downstream nodes
        can reference them.
      config:
        varName: "stale_entries"
        varExpr: 'previous_outputs["read_stale"]["results"]'

    - id: first_approval
      type: approval
      title: "First reviewer approval"
      description: |
        First independent human approval required before deletion.
      config:
        approval_prompt: "Approve deletion of stale memory entries (first reviewer)?"

    - id: check_first_approval
      type: condition
      title: "First approval granted?"
      description: |
        Abort if the first reviewer rejects the deletion request.
      config:
        expression: 'previous_outputs["first_approval"]["output"]["hitl_resolution"] == "approved"'

    - id: second_approval
      type: approval
      title: "Second reviewer approval"
      description: |
        Second independent human approval required before deletion.
      config:
        approval_prompt: "Approve deletion of stale memory entries (second reviewer)?"

    - id: check_second_approval
      type: condition
      title: "Second approval granted?"
      description: |
        Abort if the second reviewer rejects the deletion request.
      config:
        expression: 'previous_outputs["second_approval"]["output"]["hitl_resolution"] == "approved"'

    - id: delete_entries
      type: sandbox
      title: "Delete stale entries via Qdrant API"
      description: |
        Call the Qdrant REST API to delete the approved stale entries.
        The sandbox is the only node with network egress.
      config:
        template: worker-standard
        shared_workspace: false
        snapshot_before: false
        agent: opencode
        task_prompt: |
          #!/usr/bin/env bash
          set -euo pipefail

          collection="{{ inputs.collection }}"
          retention_days="{{ inputs.retention_days }}"

          # In a real implementation, this would call the Qdrant REST API
          # to delete points older than retention_days. For the blueprint
          # demonstration, we emit a structured log of the planned deletion.
          echo "Deleting stale entries from collection: ${collection}"
          echo "Retention threshold (days): ${retention_days}"

          # Emit a fenced JSON block describing the operation.
          python3 -c 'import json,os; print(json.dumps({"collection": os.environ["collection"], "retention_days": os.environ["retention_days"], "status": "deleted"}))' <<<"" 2>/dev/null || true

    - id: notify
      type: webhook
      title: "Notify on deletion"
      description: |
        POST a completion notice to the configured alert webhook.
      config:
        url: "{{ inputs.alert_webhook_url }}"
        method: "POST"
        headers:
          Content-Type: "application/json"

    - id: log_rejected
      type: log
      title: "Log rejection"
      description: |
        Emit a warning when one of the reviewers rejected the deletion.
      config:
        level: warning
        message: "Deletion from {{ inputs.collection }} rejected by reviewer."

    - id: log_deletion
      type: log
      title: "Log deletion"
      description: |
        Emit an info-level log recording the deletion.
      config:
        level: info
        message: "Deleted stale entries from {{ inputs.collection }} after {{ inputs.retention_days }} days."

  edges:
    - source: read_stale
      target: bridge_stale
    - source: bridge_stale
      target: first_approval
    - source: first_approval
      target: check_first_approval
    - source: check_first_approval
      target: second_approval
      condition: "true"
    - source: check_first_approval
      target: log_rejected
      condition: "false"
    - source: second_approval
      target: check_second_approval
    - source: check_second_approval
      target: delete_entries
      condition: "true"
    - source: check_second_approval
      target: log_rejected
      condition: "false"
    - source: delete_entries
      target: notify
    - source: notify
      target: log_deletion
    - source: log_rejected
      target: log_deletion

  budget:
    max_cost_usd: 2.00
    max_wall_time_seconds: 600
    max_iterations: 30
    max_depth: 3

  config: {}
