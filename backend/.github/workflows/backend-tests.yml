name: Backend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  PYTHONPATH: /opt/flowmanner/backend
  CI: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: flowmanner
          POSTGRES_PASSWORD: flowmanner
          POSTGRES_DB: flowmanner
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check app/ --ignore E501,E402,F811 --target-version py311 || echo "Lint issues found (non-blocking)"

      - name: Lint blueprints
        run: |
          cd ..
          make lint-blueprints

      - name: Run core tests
        run: |
          pytest tests/ \
            -v \
            --timeout=60 \
            --ignore=tests/chaos \
            --ignore=tests/test_cost_engine.py \
            --ignore=tests/test_memory_consolidation_worker.py \
            --ignore=tests/test_human_interrupt_primitives.py \
            --ignore=tests/test_mission_circuit_breaker.py \
            --ignore=tests/test_agent_protocol.py \
            --ignore=tests/test_alerting_channels.py \
            --ignore=tests/test_byok_api.py \
            --ignore=tests/test_chat_streaming.py \
            --ignore=tests/test_discord_connector.py \
            --ignore=tests/test_github_connector.py \
            --ignore=tests/test_google_connector.py \
            --ignore=tests/test_h1_3_observability_abort.py \
            --ignore=tests/test_chat_service_byok.py \
            -x \
            2>&1 | tail -80

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            .pytest_cache/
            test-results/
          if-no-files-found: ignore
