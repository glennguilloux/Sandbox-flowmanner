# flowmanner-regression-watchdog.yaml — version 1
#
# Pattern #8: Regression watchdog.
#
# Runs a target task, scores the output with an LLM evaluator, and compares
# the score against a stored baseline in Qdrant. If the score drops more than
# the tolerance threshold, a webhook alert fires. On each run, the new score
# is stored as the updated baseline.
#
# blueprint_type: dag
# Product name: flowmanner (double-n, no 'p').

version: 1

name: "flowmanner-regression-watchdog"
description: |
  Regression watchdog. Executes a target task, scores the output on a 0-100
  scale, compares it to the stored baseline, and alerts via webhook when a
  regression exceeds the configured tolerance. The new score is always stored
  as the updated baseline.

blueprint_type: dag

inputs:
  task_description:
    type: string
    description: "Description of the task to monitor for regressions."
  task_command:
    type: string
    description: "The shell command or task to execute in the sandbox."
  tolerance:
    type: integer
    default: 10
    description: "Score drop tolerance before alerting."
  alert_webhook_url:
    type: string
    default: ""
    description: "Webhook URL for regression alerts."
  run_timestamp:
    type: string
    default: ""
    description: "ISO timestamp for this run (for audit trail)."
  model:
    type: string
    default: ""
    description: "Optional model override for the quality evaluator."

definition:
  blueprint_type: dag
  nodes:
    - id: load_baseline
      type: memory_read
      title: "Load prior baseline"
      description: |
        Retrieve the prior baseline score from shared memory.
      config:
        collection: "flowmanner_memory"
        query: "{{ inputs.task_description }}"
        topK: 1

    - id: bridge_baseline
      type: variable_set
      title: "Bridge baseline score"
      description: |
        Capture the baseline score from memory, defaulting to 0 if no
        prior baseline exists.
      config:
        varName: "baseline_score"
        varExpr: 'previous_outputs["load_baseline"]["results"][0]["score"] if previous_outputs["load_baseline"]["results"] else 0'

    - id: run_target
      type: sandbox
      title: "Execute target task"
      description: |
        Run the target command in an egress-capable sandbox.
      config:
        template: worker-standard
        shared_workspace: false
        snapshot_before: false
        agent: opencode
        task_prompt: |
          Execute the following task and return a concise summary of
          the output.

          Task: {{ inputs.task_description }}
          Command: {{ inputs.task_command }}

    - id: score_output
      type: llm_eval
      title: "Score output quality"
      description: |
        Evaluate the target output on a 0-100 scale.
      config:
        model: "{{ inputs.model }}"
        prompt: |
          Score the quality of this output on a scale of 0-100.

          Task: {{ inputs.task_description }}
          Output: {{ previous_outputs["run_target"]["output"] }}

          Consider: correctness, completeness, adherence to requirements.
          Return JSON: {"score": N, "issues": ["..."]}
        system_prompt: "You are a quality evaluator. Output valid JSON only."
        temperature: 0.2
        max_tokens: 500
        output_schema:
          score: integer
          issues: array

    - id: bridge_score
      type: variable_set
      title: "Bridge current score"
      description: |
        Capture the evaluated score for the regression check.
      config:
        varName: "current_score"
        varExpr: 'previous_outputs["score_output"]["output"]["score"]'

    - id: check_regression
      type: condition
      title: "Regression detected?"
      description: |
        True when the current score dropped below the baseline by
        more than the tolerance.
      config:
        expression: 'inputs["current_score"] < inputs["baseline_score"] - inputs["tolerance"]'

    - id: alert_regression
      type: webhook
      title: "Alert on regression"
      description: |
        POST an alert when a regression is detected.
      config:
        url: "{{ inputs.alert_webhook_url }}"
        method: POST
        headers:
          Content-Type: "application/json"

    - id: log_healthy
      type: log
      title: "Log healthy result"
      description: |
        Record that no regression was detected.
      config:
        level: info
        message: "No regression detected. Current score: {{ inputs.current_score }}"

    - id: store_baseline_healthy
      type: memory_write
      title: "Store updated baseline (healthy)"
      description: |
        Persist the new score as the updated baseline after a healthy run.
      config:
        collection: "flowmanner_regression_baseline"
        text: |
          regression baseline for {{ inputs.task_description }}
          score: {{ inputs.current_score }}
          timestamp: {{ inputs.run_timestamp }}
        payload:
          schema: regression_baseline
          source: flowmanner-regression-watchdog
          task: "{{ inputs.task_description }}"

    - id: store_baseline_alert
      type: memory_write
      title: "Store updated baseline (regression alert)"
      description: |
        Persist the new score as the updated baseline after a regression.
      config:
        collection: "flowmanner_regression_baseline"
        text: |
          regression baseline for {{ inputs.task_description }}
          score: {{ inputs.current_score }}
          timestamp: {{ inputs.run_timestamp }}
        payload:
          schema: regression_baseline
          source: flowmanner-regression-watchdog
          task: "{{ inputs.task_description }}"

    - id: log_done
      type: log
      title: "Log baseline stored"
      description: |
        Record that the baseline was updated.
      config:
        level: info
        message: "Regression watchdog complete. Baseline updated to {{ inputs.current_score }}."

    - id: log_alert
      type: log
      title: "Log regression alert"
      description: |
        Record that a regression alert was sent.
      config:
        level: warning
        message: "Regression alert fired. Baseline: {{ inputs.baseline_score }}, Current: {{ inputs.current_score }}."

  edges:
    - source: load_baseline
      target: bridge_baseline
    - source: bridge_baseline
      target: run_target
    - source: run_target
      target: score_output
    - source: score_output
      target: bridge_score
    - source: bridge_score
      target: check_regression
    - source: check_regression
      target: log_healthy
      condition: "false"
    - source: check_regression
      target: alert_regression
      condition: "true"
    - source: log_healthy
      target: store_baseline_healthy
    - source: alert_regression
      target: store_baseline_alert
    - source: store_baseline_healthy
      target: log_done
    - source: store_baseline_alert
      target: log_alert

  budget:
    max_cost_usd: 5.00
    max_wall_time_seconds: 600
    max_iterations: 50
    max_depth: 3

  config: {}
