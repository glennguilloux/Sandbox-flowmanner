# flowmanner-regression-watchdog.yaml — version 1
#
# Pattern #8: Regression watchdog.
#
# Compares a target model/blueprint's outputs against a stored golden baseline.
# The golden set is read from memory, split into individual examples, and
# each example is run through the target. An LLM-as-judge flags regressions.
# Results are merged, a pass-rate is computed, and a webhook fires if the
# regression rate exceeds the configured threshold.
#
# blueprint_type: dag
# Product name: flowmanner (double-n, no 'p').

version: 1

name: "flowmanner-regression-watchdog"
description: |
  Regression watchdog. Fetches a golden baseline from memory, runs each
  example through a target model, evaluates outputs for regressions,
  computes pass rate, and alerts via webhook when regressions exceed the
  threshold.

blueprint_type: dag

inputs:
  golden_query:
    type: string
    default: "golden_test_set_v1"
    description: "Memory query key for the golden baseline set."
  regression_threshold:
    type: number
    default: 0.2
    description: "Fraction of failing examples that triggers an alert (0-1)."
  alert_webhook_url:
    type: string
    default: ""
    description: "Webhook URL to alert when regressions exceed the threshold."

definition:
  blueprint_type: dag
  nodes:
    - id: fetch_golden
      type: memory_read
      title: "Fetch golden baseline"
      description: |
        Retrieve the stored golden baseline examples from memory.
      config:
        collection: "flowmanner_memory"
        query: "{{ inputs.golden_query }}"
        topK: 10

    - id: set_golden
      type: variable_set
      title: "Store golden items"
      description: |
        Bridge the retrieved golden examples into a run variable.
      config:
        varName: "golden_items"
        varExpr: 'previous_outputs["fetch_golden"]["results"]'

    - id: split_golden
      type: split
      title: "Iterate over golden examples"
      description: |
        Process each golden example independently in parallel.
      config:
        mode: item
        splitOn: "get(inputs, 'golden_items')"

    - id: run_target
      type: llm_call
      title: "Run target on example"
      description: |
        Execute the target task for the current golden example.
      config:
        prompt: |
          Task: {{ inputs.item.task }}
          Provide a concise answer.

    - id: evaluate
      type: llm_eval
      title: "Check for regression"
      description: |
        Judge whether the target output regresses from the golden answer.
      config:
        prompt: |
          Target output: {{ previous_outputs["run_target"]["output"] }}
          Golden answer: {{ inputs.item.expected }}

          Does the target output regress from the golden answer?
          Respond with JSON: {"passed": true/false, "rationale": "..."}
        output_schema:
          passed: boolean
          rationale: string

    - id: merge_results
      type: merge
      title: "Merge evaluation results"
      description: |
        Gather all per-example regression checks.
      config:
        mergeStrategy: concat

    - id: compute_pass_rate
      type: transform
      title: "Compute pass rate"
      description: |
        Calculate the fraction of examples that passed.
      config:
        transformType: expression
        transformExpression: '{"pass_rate": sum(1 for item in previous_outputs["merge_results"]["merged"] if item["passed"]) / len(previous_outputs["merge_results"]["merged"]) if previous_outputs["merge_results"]["merged"] else 0, "failures": sum(1 for item in previous_outputs["merge_results"]["merged"] if not item["passed"])}'

    - id: store_summary
      type: variable_set
      title: "Store summary"
      description: |
        Capture the computed pass rate and failure count.
      config:
        varName: "summary"
        varExpr: 'previous_outputs["compute_pass_rate"]["output"]'

    - id: check_regression
      type: condition
      title: "Regression rate exceeds threshold?"
      description: |
        Branch based on whether the failure rate exceeds the threshold.
      config:
        expression: '(1 - inputs["summary"]["pass_rate"]) > inputs["regression_threshold"]'

    - id: alert_regression
      type: webhook
      title: "Alert on regression"
      description: |
        POST a regression alert to the configured webhook.
      config:
        url: "{{ inputs.alert_webhook_url }}"
        method: POST
        headers:
          Content-Type: "application/json"

    - id: log_healthy
      type: log
      title: "Log healthy baseline"
      description: |
        Record that the target passed the regression watchdog.
      config:
        level: info
        message: "Regression watchdog passed. Failures: {{ inputs.summary['failures'] }}"

  edges:
    - source: fetch_golden
      target: set_golden
    - source: set_golden
      target: split_golden
    - source: split_golden
      target: run_target
    - source: run_target
      target: evaluate
    - source: evaluate
      target: merge_results
    - source: merge_results
      target: compute_pass_rate
    - source: compute_pass_rate
      target: store_summary
    - source: store_summary
      target: check_regression
    - source: check_regression
      target: alert_regression
      condition: "true"
    - source: check_regression
      target: log_healthy
      condition: "false"

  budget:
    max_cost_usd: 5.00
    max_wall_time_seconds: 600
    max_iterations: 50
    max_depth: 3

  config: {}
