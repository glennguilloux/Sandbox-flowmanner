# flowmanner-critic-revise-loop.yaml — version 1
#
# Pattern #27: Critic-revise loop.
#
# Generator-critic revision loop. An llm_call generates output, an llm_eval
# critic scores it, and a condition checks if the score meets the threshold.
# If not, a LOOP node sends it back for revision. The loop is bounded by
# max_iterations and a variable_set step counter.
#
# blueprint_type: dag
# Product name: flowmanner (double-n, no 'p').

version: 1

name: "flowmanner-critic-revise-loop"
description: |
  Generator-critic revision loop. Generates output, critiques it, and
  revises until the critic score meets the threshold or the iteration
  cap is reached.

blueprint_type: dag

inputs:
  task_prompt:
    type: string
    description: "The content generation task."
  quality_threshold:
    type: integer
    default: 80
    description: "Minimum critique score to accept the output."
  model:
    type: string
    default: ""
    description: "Optional model override."

definition:
  blueprint_type: dag
  nodes:
    - id: init_revision_count
      type: variable_set
      title: "Initialize revision counter"
      description: |
        Seed the revision counter used by the loop body.
      config:
        varName: "revision_count"
        varValue: 0

    - id: revision_loop
      type: loop
      title: "Bounded revision loop"
      description: |
        Iterate generate → critique → check quality until quality is met
        or the iteration cap is reached.
      config:
        body:
          - generate
          - critique
          - bridge_critique
          - set_feedback
          - set_quality_score
          - check_quality
          - increment_revision
        max_iterations: 5
        stop_condition: 'previous_outputs["check_quality"]["value"]'

    - id: generate
      type: llm_call
      title: "Generate or revise output"
      description: |
        Produce the initial draft or revise it based on critique feedback.
      config:
        model: "{{ inputs.model }}"
        prompt: |
          You are generating content for: {{ inputs.task_prompt }}

          Revision count: {{ inputs.revision_count }}

          {% if inputs.revision_count > 0 %}
          Previous critique: {{ inputs.critique_feedback }}
          Address the critique and improve your output.
          {% endif %}

          Produce high-quality output.
        system_prompt: "You are an expert content generator."
        temperature: 0.5
        max_tokens: 1000

    - id: critique
      type: llm_eval
      title: "Critique generated output"
      description: |
        Score the generated output and provide improvement suggestions.
      config:
        prompt: |
          Critique the following output for quality. Score 0-100.

          Task: {{ inputs.task_prompt }}
          Output: {{ previous_outputs["generate"]["output"] }}

          Return JSON: {"score": N, "feedback": "specific improvement suggestions"}
        system_prompt: "You are a strict critic. Output valid JSON only."
        temperature: 0.3
        max_tokens: 600
        output_schema:
          score: integer
          feedback: string

    - id: bridge_critique
      type: variable_set
      title: "Bridge critique result"
      description: |
        Capture the critique score and feedback for downstream nodes.
      config:
        varName: "critique"
        varExpr: 'previous_outputs["critique"]["output"]'

    - id: set_feedback
      type: variable_set
      title: "Store critique feedback"
      description: |
        Capture the critique feedback text for the generator.
      config:
        varName: "critique_feedback"
        varExpr: 'inputs["critique"]["feedback"]'

    - id: set_quality_score
      type: variable_set
      title: "Store quality score"
      description: |
        Capture the numeric quality score for the condition check.
      config:
        varName: "quality_score"
        varExpr: 'inputs["critique"]["score"]'

    - id: check_quality
      type: condition
      title: "Quality threshold met?"
      description: |
        Exit the loop if the quality score meets the threshold.
      config:
        expression: 'inputs["quality_score"] >= inputs["quality_threshold"]'

    - id: increment_revision
      type: variable_set
      title: "Increment revision counter"
      description: |
        Track how many revision rounds have run.
      config:
        varName: "revision_count"
        varExpr: 'inputs["revision_count"] + 1'

    - id: finalize_output
      type: llm_call
      title: "Finalize accepted output"
      description: |
        Produce a polished final version of the accepted output.
      config:
        model: "{{ inputs.model }}"
        prompt: |
          Produce a polished final version of the following content.
          No further changes are needed.

          Task: {{ inputs.task_prompt }}
          Accepted draft: {{ inputs.critique }}

          Return the final output.
        system_prompt: "You are an expert editor."
        temperature: 0.3
        max_tokens: 1000

    - id: log_result
      type: log
      title: "Log final result"
      description: |
        Record the final quality score and revision count.
      config:
        level: info
        message: "Final output accepted with score {{ inputs.quality_score }} after {{ inputs.revision_count }} revisions."

  edges:
    - source: init_revision_count
      target: revision_loop
    # Loop body execution order
    - source: revision_loop
      target: generate
    - source: generate
      target: critique
    - source: critique
      target: bridge_critique
    - source: bridge_critique
      target: set_feedback
    - source: set_feedback
      target: set_quality_score
    - source: set_quality_score
      target: check_quality
    # Exit condition: true = quality met → exit loop
    - source: check_quality
      target: finalize_output
      condition: "true"
    # Continue: false = needs revision → increment and loop
    - source: check_quality
      target: increment_revision
      condition: "false"
    - source: finalize_output
      target: log_result

  budget:
    max_cost_usd: 5.00
    max_wall_time_seconds: 900
    max_iterations: 50
    max_depth: 3

  config: {}
