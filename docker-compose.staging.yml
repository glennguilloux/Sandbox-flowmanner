# Flowmanner Staging Environment
# Usage: docker compose -f docker-compose.staging.yml up -d
# Requires: staging .env file at .env.staging

networks:
  staging-web:
    name: flowmanner_staging
    driver: bridge

services:
  postgres-staging:
    image: postgres:15-alpine
    container_name: staging-postgres
    restart: unless-stopped
    networks:
      staging-web:
        ipv4_address: 10.0.5.2
    environment:
      POSTGRES_USER: ${STAGING_POSTGRES_USER:-flowmanner_staging}
      POSTGRES_PASSWORD: ${STAGING_POSTGRES_PASSWORD:-staging_password_change_me}
      POSTGRES_DB: ${STAGING_POSTGRES_DB:-flowmanner_staging}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STAGING_POSTGRES_USER:-flowmanner_staging}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 1g
    mem_reservation: 256m

  qdrant-staging:
    image: qdrant/qdrant:v1.12.0
    container_name: staging-qdrant
    restart: unless-stopped
    networks:
      staging-web:
        ipv4_address: 10.0.5.3
    volumes:
      - staging_qdrant_data:/qdrant/storage
    ports:
      - "16333:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    mem_reservation: 128m

  redis-staging:
    image: redis:7-alpine
    container_name: staging-redis
    restart: unless-stopped
    networks:
      staging-web:
        ipv4_address: 10.0.5.5
    command: >
      redis-server
      --requirepass ${STAGING_REDIS_PASSWORD:-staging_redis_pass}
      --bind 0.0.0.0
      --appendonly yes
    volumes:
      - staging_redis_data:/data
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${STAGING_REDIS_PASSWORD:-staging_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    mem_reservation: 64m

  backend-staging:
    image: ${STAGING_BACKEND_IMAGE:-workflows-backend:staging}
    container_name: staging-backend
    restart: unless-stopped
    networks:
      staging-web:
        ipv4_address: 10.0.5.6
    env_file:
      - .env.staging
    environment:
      DATABASE_URL: postgresql+asyncpg://${STAGING_POSTGRES_USER:-flowmanner_staging}:${STAGING_POSTGRES_PASSWORD:-staging_password_change_me}@postgres-staging:5432/${STAGING_POSTGRES_DB:-flowmanner_staging}
      REDIS_URL: redis://:${STAGING_REDIS_PASSWORD:-staging_redis_pass}@redis-staging:6379
      QDRANT_URL: http://qdrant-staging:6333
      ENVIRONMENT: staging
      PYTHONUNBUFFERED: "1"
    ports:
      - "18000:8000"
    depends_on:
      postgres-staging:
        condition: service_healthy
      redis-staging:
        condition: service_healthy
      qdrant-staging:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    mem_limit: 2g
    mem_reservation: 512m

  frontend-staging:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: staging-frontend
    restart: unless-stopped
    networks:
      staging-web:
        ipv4_address: 10.0.5.7
    environment:
      NEXTAUTH_URL: ${STAGING_NEXTAUTH_URL:-http://localhost:13000}
      NEXTAUTH_SECRET: ${STAGING_NEXTAUTH_SECRET:-staging_secret_change_me}
      NEXT_PUBLIC_API_URL: ${STAGING_API_URL:-http://localhost:18000}
    ports:
      - "13000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 1g
    mem_reservation: 256m

volumes:
  staging_postgres_data:
    name: flowmanner_staging_postgres
  staging_qdrant_data:
    name: flowmanner_staging_qdrant
  staging_redis_data:
    name: flowmanner_staging_redis
