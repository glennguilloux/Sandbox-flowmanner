# harness-config.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Base configuration for the harness-evolution meta-optimizer
# (`.sisyphus/prototypes/harness_meta_optimizer.py`).
#
# Invoked as:
#   HARNESS_EVAL_COMMAND="./scripts/evaluate_harness.sh" \
#     python harness_meta_optimizer.py --config harness-config.yaml --budget 50
#
# This single document serves TWO consumers and MUST satisfy BOTH:
#   1. The optimizer / prototype (harness_meta_optimizer.py):
#        - reads `routing.catalog` (a LIST of {id, ...} model specs) via
#          model_catalog() -> {item["id"]: item}
#        - reads `verification.*` gates via verify_candidate()
#        - mutate() reads `tools` (ids "retrieve", "web_search") and
#          `routing.semantic_cache_threshold`; the YAML MUST contain them so a
#          mutated candidate stays structurally valid.
#   2. The real evaluator shim (app.services.substrate.evaluate_harness):
#        - build_workflow() reads `workflow.nodes` / `workflow.edges`
#        - score_case() requires an `answer` node that emits `risk_level`
#        - inject_rag_knobs() reads `memory.*`
#        - safety_check() reads `verification.forbidden_tools`
#   The prototype writes the ENTIRE config as the candidate JSON passed to the
#   shim, so this file is simultaneously the optimizer base AND the shim input.
#
# Mutation axes (live, wired into the runtime per evaluate_harness.py:21-23):
#   - answer.assigned_model
#   - answer.config.temperature
#   - answer.config.system_prompt
#   - answer.config.tool_ids
# GATED axes (injected via settings monkeypatch + RAGService n_results):
#   - memory.top_k, memory.similarity_threshold, memory.reranker
# INERT axes (embedding-time only; reported as knobs_inert, never faked):
#   - memory.chunk_size, memory.chunk_overlap
# ─────────────────────────────────────────────────────────────────────────────

workspace_id: null

workflow:
  nodes:
    - id: rag
      type: rag_query
      title: Retrieve churn cases
      config:
        collection: churn_history
        query: "<placeholder, overwritten per-case by _format_case_prompt>"
        top_k: 5
      effect_class: reversible

    - id: answer
      type: llm_call
      title: Score churn risk
      assigned_model: llamacpp/Qwen3.6-27B
      config:
        prompt: >-
          You are a senior research analyst. Analyze the account using the
          retrieved churn cases. For each claim, cite its source node id. If the
          retrieved set cannot support a conclusion, set risk_level to "unknown".
          Return only JSON: {"risk_level": "high"|"low"|"unknown", "basis":
          "<one sentence, cited>", "recommended_action": "<one sentence>"}.
        temperature: 0.0
        system_prompt: >-
          You are a senior research analyst. Use retrieved context as the primary
          knowledge source. Cite the source node id for every factual claim. If
          retrieval is empty or insufficient, explicitly say so. Return only the
          requested JSON.
        tool_ids: []
      effect_class: reversible

  edges:
    - source: rag
      target: answer

memory:
  top_k: 5
  similarity_threshold: 0.0
  reranker: false
  chunk_size: 800
  chunk_overlap: 120
  decay_rate_per_day: 0.01

verification:
  forbidden_tools:
    - delete_data
    - send_email
    - delete_collection
  edge_target_validation:
    reject_dangling_edges: true
    reject_self_loops: true
  required_edges:
    - ["rag", "answer"]
  personal_memory_claim_constraints: []

# Model catalog consumed by model_catalog() (verify_candidate + mutate).
# `in` / `out` are relative cost weights used by the demo surrogate only; the
# real evaluator derives cost from the live run, not these numbers. The local
# local llamacpp model has cost 0 (no API key, $0) and MUST be the default answer
# model so a live smoke runs with no cloud key. NOTE the SLASH form
# `llamacpp/qwen3.6-27b` (not `llamacpp-qwen3.6-27b`): app.services.llm_providers
# ._get_provider_for_model splits on "/" — a hyphenated id has NO provider
# prefix and would fall through to the default cloud key (and hit the hard-refuse
# gate at llm_router.py:242). The slash form routes to PROVIDER_MAP["llamacpp"]
# which returns api_key="not-needed" (see llm_providers._resolve_provider). The
# prototype's MODEL_CHOICES uses the hyphen token, but the catalog id MUST match
# the runtime model id exactly so verify_candidate(answer.assigned_model in
# routing.catalog) passes.
routing:
  semantic_cache_threshold: 0.9
  catalog:
    - id: llamacpp/Qwen3.6-27B
      provider: llamacpp
      in: 0.0
      out: 0.0
      enabled: true
      cost: 0.0
      local: true
    - id: glennguilloux-demo-llm
      provider: openai_compatible
      in: 0.0005
      out: 0.0015
      enabled: true
      cost: 0.002
      local: false
    - id: deepseek-v4-flash
      provider: deepseek
      in: 0.00027
      out: 0.0011
      enabled: true
      cost: 0.00137
      local: false
    - id: deepseek-chat
      provider: deepseek
      in: 0.00027
      out: 0.0011
      enabled: true
      cost: 0.00137
      local: false
    - id: deepseek-reasoner
      provider: deepseek
      in: 0.00055
      out: 0.0022
      enabled: true
      cost: 0.00275
      local: false
    - id: claude-3-haiku
      provider: anthropic
      in: 0.00025
      out: 0.00125
      enabled: true
      cost: 0.0015
      local: false
    - id: claude-3-5-sonnet
      provider: anthropic
      in: 0.003
      out: 0.015
      enabled: true
      cost: 0.018
      local: false
    - id: openrouter-gemini-2.0-flash
      provider: openrouter
      in: 0.0001
      out: 0.0004
      enabled: true
      cost: 0.0005
      local: false

# Tools referenced by mutate() (description variants). They are informational
# for the optimizer; the live shim ignores tool_ids on the answer node because
# the workflow has no tool_call node.
tools:
  - id: retrieve
    type: rag
    description: >-
      Semantic retrieval over the workspace collection. Use this as the primary
      knowledge source for workspace facts. Returns ranked chunks with source
      node ids.
  - id: web_search
    type: web_search
    description: >-
      Search the live web (SearXNG) for recent, attributable public information.
      Use only when required facts are absent from retrieved workspace context.

# Optimizer knobs (documentation only — the prototype reads budget/warmup/seed
# from CLI flags, not from here; listed so a human can see the run contract).
optimizer:
  budget: 50
  warmup: 12
  seed: 7
  split: train
  demo: false
