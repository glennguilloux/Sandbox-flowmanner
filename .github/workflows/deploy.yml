# Deploy workflow — orchestrates Flowmanner backend + frontend deploys.
#
# Architecture (after 2026-06-19 redesign):
#   * All jobs run on self-hosted runner (homelab).
#   * deploy-backend: runs /opt/flowmanner/deploy-backend.sh directly.
#     The script is homelab-local — it builds the docker image from
#     /opt/flowmanner/backend/ and restarts the homelab containers.
#   * deploy-frontend: runs /opt/flowmanner/deploy-frontend.sh directly.
#     The script rsyncs /home/glenn/FlowmannerV2-frontend/ to the VPS and
#     builds + restarts the frontend container + nginx there.
#   * verify: curls backend + frontend from the homelab.
#
# Why no VPS-side intermediate script anymore: the old workflow uploaded
# deploy-backend.sh to the VPS and executed it there, but the script does
# `ssh $HOMELAB` from inside (it assumes it's running locally on the
# homelab). That nested VPS→homelab hop failed at the root key chain. The
# fix is to run the deploy scripts on the homelab directly, where they're
# actually designed to run.
#
# Migrations: the workflow does NOT pass --migrate. If alembic migrations
# need to run, run them manually first:
#   bash /opt/flowmanner/deploy-backend.sh --migrate
# Then push to trigger the workflow (which will redeploy without
# re-migrating). Migration safety requires the operator's eye, not the
# workflow's.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-backend:
    name: Deploy backend (homelab-local)
    runs-on: self-hosted
    environment: production
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # The homelab has /home/glenn/.rd/bin in PATH which contains the
      # Rancher Desktop docker shim. The shim rejects standard
      # 'docker compose up -d ...' flag combinations in non-TTY contexts
      # (works fine when the user runs deploy-backend.sh interactively,
      # fails in CI). Force the real docker by symlinking it ahead of
      # .rd/bin in PATH.
      - name: Deploy backend
        env:
          DOCKER_CONFIG: /tmp/fm-deploy-docker-config
          PATH: /usr/local/bin:/usr/bin:/bin
        run: |
          mkdir -p "$DOCKER_CONFIG"
          echo '{"auths":{}}' > "$DOCKER_CONFIG/config.json"
          echo "DEBUG: which docker=$(which docker)"
          echo "DEBUG: docker version=$(docker --version 2>&1 | head -1)"
          bash /opt/flowmanner/deploy-backend.sh

  deploy-frontend:
    name: Deploy frontend (homelab → VPS)
    runs-on: self-hosted
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Deploy frontend
        run: bash /opt/flowmanner/deploy-frontend.sh

  verify:
    name: Post-deploy verification
    runs-on: self-hosted
    needs: [deploy-backend, deploy-frontend]
    if: always() && !cancelled()
    timeout-minutes: 5
    steps:
      - name: Verify backend health
        if: needs.deploy-backend.result == 'success'
        run: |
          curl -fsS http://localhost:8000/health && echo " Backend OK"

      - name: Verify frontend health
        if: needs.deploy-frontend.result == 'success'
        run: |
          curl -fsS -o /dev/null -w '%{http_code}\n' https://flowmanner.com/ && echo " Frontend OK"

      - name: Deployment summary
        if: always()
        run: |
          echo "Backend deploy:  ${{ needs.deploy-backend.result }}"
          echo "Frontend deploy: ${{ needs.deploy-frontend.result }}"
