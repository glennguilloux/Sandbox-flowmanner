name: Publish SDK to TestPyPI

on:
  push:
    tags:
      - 'sdk-v*'   # triggers on SDK version tags (e.g., sdk-v0.1.0)

permissions:
  id-token: write   # required for OIDC trusted publishing
  contents: read

jobs:
  # ── Build, test & verify ────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-python/flowmanner-api-client
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'sdk-python/flowmanner-api-client/pyproject.toml'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build pytest
          pip install -e .

      - name: Run SDK tests
        run: pytest tests/ -v

      - name: Build package
        run: python -m build

      - name: Verify wheel installs
        run: |
          set -e
          python -m venv /tmp/verify-venv
          /tmp/verify-venv/bin/pip install dist/*.whl
          /tmp/verify-venv/bin/python -c "from flowmanner_api_client import FlowmannerClient; print('Import OK')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: sdk-python/flowmanner-api-client/dist/

  # ── Publish to TestPyPI ─────────────────────────────────────────
  # Prerequisites:
  #   1. Create GitHub environment named 'testpypi' in repo settings
  #   2. Configure OIDC trusted publishing on TestPyPI:
  #      Settings → Publishing → Add publisher
  #      Owner: <github-org>, Repository: flowmanner, Workflow: publish-sdk-testpypi.yml
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
