name: PR Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deletion-guard-and-sanity:
    name: Deletion guard + backend sanity
    runs-on: self-hosted

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assert no deleted backend/frontend files lack justification
        run: |
          set -euo pipefail

          DELETED=$(git diff --diff-filter=D --name-only "${{ github.event.pull_request.base.sha }}...HEAD" \
            | grep -E '^(backend|frontend)/.*\.(py|ts|tsx)$' || true)

          if [ -n "$DELETED" ]; then
            echo "::error::Deleted backend/frontend file(s) need justification before merge:"
            echo "$DELETED"
            echo "Add a justification to the commit body, or retire the covered contract to docs/LEGACY.md (§5.1)."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend pytest sanity check
        env:
          APP_ENV: test
          OPENAI_API_KEY: sk-test-key-123
          LANGFUSE_PUBLIC_KEY: test-public-key
          LANGFUSE_SECRET_KEY: test-secret-key
          JWT_SECRET_KEY: test-jwt-secret-key-123
          SECRET_KEY: test-secret-key-123
          AES_ENCRYPTION_KEY: test-aes-key-16-char
          LANGFUSE_ENABLED: "false"
        run: |
          cd backend
          python -m pytest tests/ -x -q --tb=short -m "not integration"
