name: PR Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deletion-guard-and-sanity:
    name: Deletion guard + backend sanity
    runs-on: self-hosted
    # Self-hosted Arch runner is on shared homelab infra. Cap the job so a
    # wedged pytest run (anon_pipe_write in a fixture) cannot burn the full
    # GitHub 6h default timeout and silently eat money. 15 min covers the
    # uv-pip-install (~90s) plus a generous pytest budget for the
    # auth-harness surface; a real failure surfaces fast, a hang is killed
    # at the boundary. 2026-06-24: response to a 1h11m pytest hang on a
    # post-merge synchronize of PR #21.
    timeout-minutes: 15

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assert no deleted backend/frontend files lack justification
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"

          DELETED=$(git diff --diff-filter=D --name-only "${BASE_SHA}...HEAD" \
            | grep -E '^(backend|frontend)/.*\.(py|ts|tsx)$' || true)

          # No backend/frontend code files deleted → pass.
          if [ -z "$DELETED" ]; then
            exit 0
          fi

          # 1) A "Deletion justification:" section in any PR commit body satisfies
          #    the guard. Matched case-insensitively on a literal substring so the
          #    author can wrap the header in markdown (e.g. "Deletion
          #    justification:" or "**Deletion justification:**") without the
          #    check becoming a regex footgun.
          if git log --format=%B "${BASE_SHA}..HEAD" \
             | grep -qi 'deletion justification:'; then
            echo "Deletion justification found in PR commit body — passing guard."
            exit 0
          fi

          # 2) Fall back to docs/LEGACY.md. The retirement table is the
          #    authoritative record of contracts removed from active enforcement
          #    (see docs/test-automation-strategy.md §5.1). Each deleted path
          #    must appear (as a substring) somewhere in the LEGACY file to be
          #    considered covered; if every deleted path is covered, the PR
          #    passes. Authors covering many files can list each path in a
          #    row of the retirement table.
          LEGACY="docs/LEGACY.md"
          declare -a UNCOVERED_ARR
          if [ -f "$LEGACY" ]; then
            while IFS= read -r path; do
              [ -z "$path" ] && continue
              if ! grep -qF -- "$path" "$LEGACY"; then
                UNCOVERED_ARR+=("$path")
              fi
            done <<< "$DELETED"
          else
            while IFS= read -r path; do
              [ -z "$path" ] && continue
              UNCOVERED_ARR+=("$path")
            done <<< "$DELETED"
          fi
          UNCOVERED=$(printf '%s\n' "${UNCOVERED_ARR[@]}")

          if [ -z "$UNCOVERED" ]; then
            echo "All deleted paths covered by ${LEGACY} — passing guard."
            exit 0
          fi

          echo "::error::Deleted backend/frontend file(s) need justification before merge:"
          echo "$UNCOVERED"
          echo "Add a 'Deletion justification:' section to one of the PR's commit bodies, or retire the covered contract to ${LEGACY} (see docs/test-automation-strategy.md §5.1)."
          exit 1

      # Self-hosted runner is Arch Linux.  actions/setup-python@v5 has no
      # prebuilt Python for Arch, so the runner's uv-managed python3.11
      # (/home/glenn/.local/bin) is used directly via uv.  A throwaway venv
      # at /tmp is created because the uv-managed interpreter refuses pip
      # installs (PEP 668 — externally-managed-environment).  The local pip
      # cache (~/.cache/pip, 9 GB on the runner) is still consulted by uv.
      - name: Set up Python 3.11 venv via uv
        run: |
          command -v uv >/dev/null || { echo "::error::uv not on PATH (self-hosted Arch runner)"; exit 1; }
          command -v python3.11 >/dev/null || { echo "::error::python3.11 not on PATH"; exit 1; }
          echo "Using $(python3.11 --version) via uv $(uv --version)"
          # /tmp persists between jobs on the self-hosted runner (unlike
          # GitHub-hosted VMs), so a prior job's venv can still be at this
          # path.  Clear it before recreating to keep the step idempotent.
          rm -rf /tmp/prcheck-venv
          uv venv /tmp/prcheck-venv --python python3.11
          uv pip install --python /tmp/prcheck-venv/bin/python -r backend/requirements.txt

      - name: Run backend pytest sanity check
        # Step-level cap so a hung pytest surfaces as a clear "pytest
        # timed out" rather than a generic job timeout in the GitHub UI.
        # Generous 10 min budget — the auth-harness surface finishes in
        # ~30s on a warm runner, this is hung-test insurance, not a
        # perf budget.
        timeout-minutes: 10
        env:
          APP_ENV: test
          OPENAI_API_KEY: '***'
          LANGFUSE_PUBLIC_KEY: test-public-key
          LANGFUSE_SECRET_KEY: test-secret-key
          JWT_SECRET_KEY: test-jwt-secret-key-123
          SECRET_KEY: test-secret-key-123
          AES_ENCRYPTION_KEY: test-aes-key-16-char
          LANGFUSE_ENABLED: "false"
        run: |
          cd backend
          # Audio-domain tests are skipped here: they depend on pydub, which
          # is an undeclared optional import (not in requirements.txt, per
          # PR #4).  #4 removes these files entirely; until it merges,
          # --ignore keeps the gate focused on the auth-harness and
          # surrounding surface rather than failing on a missing optional
          # dep that the codebase is moving away from.
          #
          # Substrate lease reclaimer tests are marked @pytest.mark.integration
          # upstream (recent commit on PR #17) because they need a real
          # Postgres on localhost:5432 which the CI runner does not provide.
          /tmp/prcheck-venv/bin/python -m pytest tests/ \
            --ignore=tests/test_audio_format_converter.py \
            --ignore=tests/test_audio_sentiment_analyzer.py \
            --ignore=tests/test_speaker_diarization.py \
            --ignore=tests/test_speech_to_text_transcriber.py \
            -x -q --tb=short -m "not integration"

      # Model-drift guard: assert every ORM model is registered on
      # Base.metadata. An orphaned model (defined but never imported by
      # app.models) would be DROPPED on the next autogenerate against live
      # data. This runs with no DB and lives under app/tests/ (outside the
      # default testpaths=["tests"]), so it is invoked explicitly here rather
      # than relying on the broad `pytest tests/` collection above.
      - name: Lint blueprints
        run: |
          source /tmp/prcheck-venv/bin/activate
          make lint-blueprints

      - name: Model-registration drift guard
        env:
          APP_ENV: test
          OPENAI_API_KEY: '***'
        run: |
          cd backend
          /tmp/prcheck-venv/bin/python -m pytest app/tests/test_models_registered.py -q

      # FE<->BE contract-drift guard. The frontend checkout is a SEPARATE
      # private repo, so it is normally absent on the backend CI runner. The
      # guard therefore SKIPS (passes) when $FE_REPO is not present, and only
      # runs when a frontend source tree is provided (e.g. a combined runner
      # or a downstream frontend-repo CI job that checks out both repos and
      # calls `make guard-fe-be-contract FE_REPO=<path>`). This keeps the gate
      # in-repo and prevents NEW drift from reaching prod without red-breaking
      # backend-only CI on the accepted 54-item backlog.
      - name: FE<->BE contract-drift guard (skips if no frontend checkout)
        env:
          APP_ENV: test
          OPENAI_API_KEY: '***'
        run: |
          FE_REPO="${FE_REPO:-/home/glenn/f}"
          if [ ! -d "$FE_REPO/src/lib" ]; then
            echo "No frontend checkout at $FE_REPO — skipping contract-drift guard (run it in the frontend repo CI)."
            exit 0
          fi
          cd backend
          PYTHONPATH="$(pwd)" /tmp/prcheck-venv/bin/python scripts/check_fe_be_contract.py \
            --frontend "$FE_REPO" --src src/lib
