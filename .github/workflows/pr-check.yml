name: PR Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deletion-guard-and-sanity:
    name: Deletion guard + backend sanity
    runs-on: self-hosted

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assert no deleted backend/frontend files lack justification
        run: |
          set -euo pipefail

          DELETED=$(git diff --diff-filter=D --name-only "${{ github.event.pull_request.base.sha }}...HEAD" \
            | grep -E '^(backend|frontend)/.*\.(py|ts|tsx)$' || true)

          if [ -n "$DELETED" ]; then
            echo "::error::Deleted backend/frontend file(s) need justification before merge:"
            echo "$DELETED"
            echo "Add a justification to the commit body, or retire the covered contract to docs/LEGACY.md (§5.1)."
            exit 1
          fi

      # Self-hosted runner is Arch Linux; actions/setup-python@v5 has no
      # prebuilt Python for Arch in its versions manifest, so it fails with
      # "version '3.11' ... not found for this operating system".  The
      # uv-managed python3.11 (/home/glenn/.local/bin) is present on the
      # runner and is the same interpreter the backend .venv uses.  The pip
      # cache (~/.cache/pip) is local on the self-hosted runner, so the
      # `cache: pip` setup-python option is unnecessary.
      - name: Use local Python 3.11
        run: |
          command -v python3.11 >/dev/null || { echo "::error::python3.11 not on PATH (self-hosted Arch runner)"; exit 1; }
          echo "Using $(python3.11 --version)"
          python3.11 -m pip install -r backend/requirements.txt

      - name: Run backend pytest sanity check
        env:
          APP_ENV: test
          OPENAI_API_KEY: '***'
          LANGFUSE_PUBLIC_KEY: test-public-key
          LANGFUSE_SECRET_KEY: test-secret-key
          JWT_SECRET_KEY: test-jwt-secret-key-123
          SECRET_KEY: test-secret-key-123
          AES_ENCRYPTION_KEY: test-aes-key-16-char
          LANGFUSE_ENABLED: "false"
        run: |
          cd backend
          python3.11 -m pytest tests/ -x -q --tb=short -m "not integration"
