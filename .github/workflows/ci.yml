name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Substrate-critical test gate (H3 — BLOCKING) ──────────────
  substrate-critical:
    name: Substrate gates (blocking)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Substrate unit tests (event log + replay)
        env:
          APP_ENV: test
          OPENAI_API_KEY: sk-test-key-123
          JWT_SECRET_KEY: test-secret-key-123
          SECRET_KEY: test-secret-key-123
          LANGFUSE_ENABLED: "false"
        run: python -m pytest tests/test_substrate_event_log.py tests/test_substrate_replay.py -v --tb=short

      - name: Substrate failure analyzer tests
        env:
          APP_ENV: test
          OPENAI_API_KEY: sk-test-key-123
          JWT_SECRET_KEY: test-secret-key-123
          SECRET_KEY: test-secret-key-123
          LANGFUSE_ENABLED: "false"
        run: python -m pytest tests/test_failure_analyzer_budgets.py -v --tb=short

      - name: Meta-loop orchestrator + trigger bridge tests
        env:
          APP_ENV: test
          OPENAI_API_KEY: sk-test-key-123
          JWT_SECRET_KEY: test-secret-key-123
          SECRET_KEY: test-secret-key-123
          LANGFUSE_ENABLED: "false"
        run: python -m pytest tests/test_meta_loop_orchestrator_budgets.py tests/test_trigger_bridge.py -v --tb=short

      - name: Nexus orchestrator + chaos tests
        env:
          APP_ENV: test
          OPENAI_API_KEY: sk-test-key-123
          JWT_SECRET_KEY: test-secret-key-123
          SECRET_KEY: test-secret-key-123
          LANGFUSE_ENABLED: "false"
        run: python -m pytest tests/test_nexus_orchestrator_singleton.py tests/chaos/test_kill_worker_mid_mission.py tests/chaos/test_kill_worker_mid_mission_process.py -v --tb=short

  # ── Blueprint substrate validation (Python substrate) ─────────
  lint-blueprints:
    name: Lint blueprints
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            run_lint:
              - 'backend/flowmanner-*.yaml'
              - 'blueprints/**/*.yaml'
              - 'backend/scripts/lint_blueprints.py'

      - uses: actions/setup-python@v5
        if: steps.filter.outputs.run_lint == 'true'
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        if: steps.filter.outputs.run_lint == 'true'
        run: pip install -r backend/requirements.txt

      - name: Lint blueprints
        if: steps.filter.outputs.run_lint == 'true'
        run: make lint-blueprints

  # ── Backend lint + type check + tests ──────────────────────────
  backend:
    name: Backend (lint, typecheck, tests)
    runs-on: ubuntu-latest
    # Fail fast if blueprint linting or the substrate-critical gate fails.
    needs: [substrate-critical, lint-blueprints]
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check . --output-format=github || true
        # Non-blocking: 30 legacy undefined-name errors to fix
        # Remove "|| true" once F821 errors are resolved

      - name: Mypy type check (baseline-enforced)
        # Baseline regenerated 2026-07-18 after enabling the SQLAlchemy mypy
        # plugin (backend/pyproject.toml [tool.mypy] plugins=) + bumping mypy
        # 1.8.0 -> 1.11.2. The plugin resolves ~180 spurious ORM Result
        # generic errors; ~290 genuine type errors remain tracked in the
        # baseline and are fixed incrementally (each fix shrinks it).
        # CI fails on NEW mypy errors (">" lines) but allows the existing set.
        #
        # Pipeline (must match the baseline-generation command below):
        #   --hide-error-context : strips non-deterministic context lines
        #   grep -vE 'note:'     : drops `note:` continuation lines (overload
        #     variants etc.) which are non-deterministic between runs and carry
        #     no gate signal — only `error:` lines gate.
        #   sed ... :line:... : drop line numbers (and optional column) so the
        #     baseline tracks (file, error_code, message) tuples, not (file,
        #     line, ...). Without this, any file edit shifts line numbers and
        #     makes the baseline go stale.
        #   sort -u : dedupe exact matches
        #
        # To refresh the baseline (after intentionally fixing errors):
        #   cd backend && mypy app/ --ignore-missing-imports --no-error-summary \
        #     --hide-error-context 2>&1 \
        #     | sed -E 's/:[0-9]+(:[0-9]+)?:/:line:/g' \
        #     | sort -u > mypy-baseline.txt
        run: |
          mypy app/ --ignore-missing-imports --no-error-summary --hide-error-context 2>&1 \
            | grep -vE 'note:' \
            | sed -E 's/:[0-9]+(:[0-9]+)?:/:line:/g' \
            | sort -u \
            | diff mypy-baseline.txt -
        # Replaces the previous `|| true` (no enforcement) and the brief
        # full-enforcement attempt (would have frozen the repo on 301 errors).
        # Refined 2026-06-10 to use --hide-error-context (replaces grep -v
        # 'note:') and line-number normalization (replaces bare line numbers).
        # See docs/EXIT-AUDIT-2026-06-10-session3.md (handoff item).

      - name: Run tests
        env:
          APP_ENV: test
          OPENAI_API_KEY: sk-test-key-123
          LANGFUSE_PUBLIC_KEY: test-public-key
          LANGFUSE_SECRET_KEY: test-secret-key
          JWT_SECRET_KEY: test-jwt-secret-key-123
          SECRET_KEY: test-secret-key-123
          AES_ENCRYPTION_KEY: test-aes-key-16-char
          LANGFUSE_ENABLED: "false"
        run: |
          python -m pytest tests/ -v --tb=short --timeout=30 \
            --ignore=tests/test_substrate_event_log.py \
            --ignore=tests/test_substrate_replay.py \

            --ignore=tests/test_failure_analyzer_budgets.py \
            --ignore=tests/test_meta_loop_orchestrator_budgets.py \
            --ignore=tests/test_trigger_bridge.py \
            --ignore=tests/test_nexus_orchestrator_singleton.py \
            --ignore=tests/chaos/

  # ── Frontend type check + unit tests + build ──────────────────
  # Skipped on this repo: the frontend was moved to a separate repo
  # (FlowmannerV2-frontend) and is not checked out here. Re-enable when
  # the frontend is re-merged into this monorepo.
  frontend:
    name: Frontend (tsc, vitest, build)
    runs-on: ubuntu-latest
    if: hashFiles('frontend/package-lock.json') != ''
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Build
        env:
          AUTH_TRUST_HOST: "true"
        run: npm run build

  # ── Docs + node type table drift guard ────────────────────────
  docs-and-node-type-table-drift:
    name: Docs + node type table drift guard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            run_drift:
              - 'backend/scripts/lint_blueprints.py'
              - 'backend/scripts/generate_node_type_table.py'
              - 'backend/app/services/substrate/node_executor.py'
              - 'backend/app/services/substrate/workflow_models.py'
              - 'backend/docs/substrate-node-types-table.md'
              - 'docs/**/*.md'
              - '.github/**/*.md'

      - uses: actions/setup-python@v5
        if: steps.filter.outputs.run_drift == 'true'
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        if: steps.filter.outputs.run_drift == 'true'
        run: pip install -r backend/requirements.txt

      - name: Run drift tests (node type table + docs)
        if: steps.filter.outputs.run_drift == 'true'
        working-directory: backend
        run: python -m pytest tests/test_lint_blueprints.py::TestNodeTypeTableDrift tests/test_docs_drift.py -v --tb=short

  # ── Blueprint schema validation ────────────────────────────────
  validate-blueprints:
    name: Validate backend blueprints
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install and build CLI
        run: |
          cd cli
          npm ci --ignore-scripts
          npm run build

      - name: Validate all backend blueprints
        run: |
          shopt -s nullglob
          for f in backend/flowmanner-*.yaml; do
            echo "Validating $f"
            node cli/dist/index.js validate "$f"
          done

  # ── Docker build verification ─────────────────────────────────
  docker-build:
    name: Docker build (backend)
    runs-on: ubuntu-latest
    needs: [backend]
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build \
            -t workflows-backend:ci-${{ github.sha }} \
            -t workflows-backend:restored \
            .

      - name: Verify image
        run: docker images workflows-backend --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

  # ── Playwright E2E (main branch only) ─────────────────────────
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && hashFiles('frontend/package-lock.json') != ''
    needs: [frontend]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          CI: "true"
        run: npx playwright test --reporter=list

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7
