name: Load Tests

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "tests/load/**"
      - ".github/workflows/load-test.yml"
  workflow_dispatch:
    inputs:
      test_script:
        description: "Test script to run"
        required: false
        default: "full"
        type: choice
        options:
          - health
          - login
          - missions
          - search
          - full
          - all

concurrency:
  group: load-${{ github.ref }}
  cancel-in-progress: true

jobs:
  load-test:
    name: Load Tests (k6)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: flowmanner
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: flowmanner
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowmanner"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Start backend
        working-directory: backend
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://flowmanner:test_password@localhost:5432/flowmanner
          REDIS_URL: redis://localhost:6379
          JWT_SECRET_KEY: test-jwt-secret-key-123
          SECRET_KEY: test-secret-key-123
          AES_ENCRYPTION_KEY: test-aes-key-16-char
          LANGFUSE_ENABLED: "false"
          LLM_API_KEY: "sk-test-key"
        run: |
          python -m uvicorn app.main_fastapi:app --host 0.0.0.0 --port 8000 &
          sleep 10
          curl -sf http://localhost:8000/api/health || (echo "Backend failed to start" && exit 1)

      - name: Install k6
        run: |
          curl -sL https://github.com/grafana/k6/releases/download/v0.56.0/k6-v0.56.0-linux-amd64.tar.gz | tar xzf - -C /tmp
          sudo cp /tmp/k6-v0.56.0-linux-amd64/k6 /usr/local/bin/k6

      - name: Run load tests
        env:
          BASE_URL: http://127.0.0.1:8000
          TEST_EMAIL: loadtest@example.com
          TEST_PASSWORD: LoadTest123!
        run: |
          cd tests/load
          chmod +x run-tests.sh
          ./run-tests.sh "${{ github.event.inputs.test_script || 'health' }}" \
            --out json=reports/${{ github.event.inputs.test_script || 'health' }}-${GITHUB_SHA}.json \
            --summary-export=reports/${{ github.event.inputs.test_script || 'health' }}-${GITHUB_SHA}-summary.json

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: tests/load/reports/
          retention-days: 14

      - name: Check thresholds
        if: failure()
        run: |
          echo "::error::Load test thresholds exceeded — check the summary report"
          echo "View the full report in the uploaded artifacts"
