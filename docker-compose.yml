networks:
  workflows-web:
    name: glenn_workflows-web
    external: true

services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    networks:
      workflows-web:
        ipv4_address: 10.0.4.11
    ports:
      - "55510:8080"
    volumes:
      - type: tmpfs
        target: /etc/searxng
        tmpfs:
          size: 1048576
          mode: 511
    command: >
      sh -c "
      sed -i '/^  formats:/a\\    - json' /etc/searxng/settings.yml 2>/dev/null || true;
      exec /usr/local/searxng/entrypoint.sh
      "
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
      SEARXNG_SECRET_KEY: flowmanner-searxng-secret-2026
      SEARXNG_SEARCH__FORMATS: html,json
      SEARXNG_SERVER__LIMITER: "false"
      SEARXNG_SERVER__PUBLIC_INSTANCE: "false"
      BIND_ADDRESS: 0.0.0.0
      PORT: 8080
      FORCE_OWNERSHIP: "false"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:15-alpine
    container_name: workflow-postgres
    restart: unless-stopped
    networks:
      workflows-web:
        ipv4_address: 10.0.4.10
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowmanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowmanner_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-flowmanner}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flowmanner} -d ${POSTGRES_DB:-flowmanner}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 2g
    mem_reservation: 256m

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: workflow-qdrant
    restart: unless-stopped
    networks:
      workflows-web:
        ipv4_address: 10.0.4.3
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
      TZ: Etc/UTC
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 1g
    mem_reservation: 256m

  redis:
    image: redis:7-alpine
    container_name: workflow-redis
    restart: unless-stopped
    networks:
      workflows-web:
        ipv4_address: 10.0.4.5
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-oFvdKE3HRxsm5CscZpifmwImDidNUmX5}
      --bind 0.0.0.0
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-oFvdKE3HRxsm5CscZpifmwImDidNUmX5}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    mem_limit: 512m
    mem_reservation: 128m

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: workflow-rabbitmq
    restart: unless-stopped
    networks:
      workflows-web:
        ipv4_address: 10.0.4.9
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rabbitmq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq_password}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 512m
    mem_reservation: 128m

  celery-worker:
    image: ${BACKEND_IMAGE:-workflows-backend:restored}
    container_name: celery-worker
    restart: unless-stopped
    networks:
      workflows-web:
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 --max-tasks-per-child=100
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks.celery_app", "inspect", "ping", "--timeout=10"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    mem_limit: 2g
    mem_reservation: 256m

  celery-beat:
    image: ${BACKEND_IMAGE:-workflows-backend:restored}
    container_name: celery-beat
    restart: unless-stopped
    networks:
      workflows-web:
    command: celery -A app.tasks.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks.celery_app", "inspect", "ping", "--timeout=10"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    mem_reservation: 128m

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: unless-stopped
    networks:
      workflows-web:
        ipv4_address: 10.0.4.7
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  backend:
    image: ${BACKEND_IMAGE:-workflows-backend:restored}
    container_name: backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      workflows-web:
        ipv4_address: 10.0.4.6
    env_file:
      - .env
    environment:
      OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: workflow-backend
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    mem_limit: 4g
    mem_reservation: 512m

  static:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    container_name: workflows-static
    restart: unless-stopped
    networks:
      workflows-web:
        ipv4_address: 10.0.4.8
    volumes:
      - ${STATIC_FILES_PATH:-./static}:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "-w", "%{http_code}", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 128m
    mem_reservation: 32m

volumes:
  postgres_data:
    name: glenn_postgres_data
    external: true
  qdrant_data:
    name: glenn_qdrant_data
    external: true
  redis_data:
    name: glenn_redis_data
    external: true
  rabbitmq_data:
    name: glenn_rabbitmq_data
    external: true
  uploads_data: