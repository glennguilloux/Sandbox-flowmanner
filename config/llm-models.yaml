# LLM Model Configuration — used by llm-model-manager daemon
# Edit this file to add new models. Each model defines its GGUF path and
# llama-server launch flags (including speculative decoding settings).

models:
  qwen3.6-27b-mtp:
    display_name: "Qwen3.6-27B (MTP)"
    model_path: /mnt/apps/models/mtp/Qwen3.6-27B-Q5_K_M-mtp.gguf
    ctx_size: 32768
    gpu_layers: 99
    flash_attn: on
    parallel: 1
    # MTP speculative decoding (requires MTP-baked GGUF)
    spec_type: draft-mtp
    spec_draft_n_max: 3
    spec_p_min: 0.75
    description: "Dense 27B with built-in MTP draft heads (~2x speedup)"
    architecture: qwen35
    quantization: Q5_K_M

  ornith-1.0-35b:
    display_name: "Ornith-1.0-35B Q5_K_M (MoE)"
    model_path: /mnt/apps/models/mtp/deepreinforce-ai_Ornith-1.0-35B-Q5_K_M.gguf
    ctx_size: 32768
    gpu_layers: 99
    flash_attn: on
    parallel: 1
    # No MTP heads in this GGUF — use n-gram speculation instead
    spec_type: ngram-simple
    spec_ngram_simple_size_n: 12
    spec_ngram_simple_size_m: 48
    spec_ngram_simple_min_hits: 1
    description: "35B MoE, ~3B active per token. Runs like 3B, thinks like 27B."
    architecture: qwen35moe
    quantization: Q5_K_M

  ornith-1.0-35b-q6-mtp:
    display_name: "Ornith-1.0-35B Q6_K (MTP)"
    model_path: /mnt/apps/models/mtp/Ornith-1.0-35B-Q6_K-MTP.gguf
    ctx_size: 32768
    gpu_layers: 99
    flash_attn: on
    parallel: 1
    # MTP speculative decoding (requires MTP-baked GGUF)
    spec_type: draft-mtp
    spec_draft_n_max: 3
    spec_p_min: 0.75
    description: "35B MoE with MTP draft heads, Q6_K quantization. ~3B active per token, higher precision than Q5."
    architecture: qwen35moe
    quantization: Q6_K

# Which model is currently active (managed by the daemon — do not edit manually)
# active_model: qwen3.6-27b-mtp

  qwopus3.6-35b-a3b-coder-mtp:
    display_name: "Qwopus3.6-35B-A3B (Coder MTP)"
    model_path: /mnt/apps/models/mtp/Qwopus3.6-35B-A3B-Coder-MTP-Q5_K_M.gguf
    ctx_size: 32768
    gpu_layers: 99
    flash_attn: on
    parallel: 1
    # MTP speculative decoding (requires MTP-baked GGUF)
    spec_type: draft-mtp
    spec_draft_n_max: 3
    spec_p_min: 0.75
    description: "Coder-specialized 35B-A3B MoE with MTP draft heads. Architecture matches Qwen3.6 35B-A3B but tuned for code generation."
    architecture: qwen36moe
    quantization: Q5_K_M
