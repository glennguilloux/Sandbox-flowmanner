# blueprints/scrape-diff-alert.yaml — Blueprint #20
#
# Scrape a page, compare against the prior snapshot stored in Qdrant, and
# fire a webhook alert if the page changed (or on first run when no prior
# exists).
#
# Graph strategy is required for {{node.field}} edge-condition interpolation.
# The memory pair (memory_read + memory_write) replaces the cache_get/cache_set
# pattern — there is no cache_set node type, so Qdrant is the persistence layer
# (Glenn's decision from Phase 1).
#
# Run inputs:
#   url     — the page to scrape (defaults to example.com)
#   webhook_url — where to POST the change alert (defaults to a test endpoint)
#
# Known limitation: browser node params are not interpolated at runtime
# (Phase 4+ enhancement). The URL is passed via variable_set into inputs
# and used by memory nodes; the browser_navigate node uses a hardcoded URL
# that should match the url input. Edit the navigate node's params.url
# before running against a different target.

version: 1

name: "scrape-diff-alert"
description: |
  Scrape a page, diff against the prior snapshot stored in Qdrant memory,
  and fire a webhook alert if the content changed. On the first run (no
  prior snapshot), the alert always fires.

blueprint_type: graph

inputs:
  url:
    type: string
    default: "https://example.com"
  webhook_url:
    type: string
    default: "https://httpbin.org/post"

definition:
  blueprint_type: graph
  nodes:
    # 1. Navigate to the target page and capture a snapshot.
    - id: snap
      type: browser_snapshot
      title: "Snapshot target page"
      description: "Navigate to the target URL and capture a full page snapshot."
      config:
        params:
          url: "https://example.com"

    # 2. Read the prior snapshot from Qdrant (semantic search by URL).
    - id: read_prior
      type: memory_read
      title: "Retrieve prior snapshot"
      description: "Search Qdrant for the most recent prior snapshot of this page."
      config:
        collection: "flowmanner_memory"
        query: "{{ inputs.url }}"
        topK: 1

    # 3. Extract the current fingerprint into the run-scoped inputs dict
    #    so downstream nodes can reference it via {{ inputs.current_fp }}.
    - id: set_current_fp
      type: variable_set
      title: "Extract current fingerprint"
      description: "Pull the fingerprint from the snapshot output into inputs."
      config:
        varName: "current_fp"
        varExpr: 'previous_outputs["snap"]["fingerprint"]'

    # 4. Extract the prior fingerprint (if any) into inputs.
    - id: set_prior_fp
      type: variable_set
      title: "Extract prior fingerprint"
      description: >
        Pull the prior fingerprint from the memory_read results into inputs.
        Returns empty string when no prior snapshot exists (first run).
      config:
        varName: "prior_fp"
        varExpr: >-
          previous_outputs["read_prior"]["results"][0]["payload"]["payload"]["fingerprint"]
          if len(previous_outputs["read_prior"]["results"]) > 0
          else ""

    # 5. Compare current vs prior fingerprint.
    - id: diff
      type: condition
      title: "Check if page changed"
      description: "True if fingerprints differ or no prior snapshot exists."
      config:
        expression: 'previous_outputs["set_prior_fp"] == "" or previous_outputs["set_current_fp"] != previous_outputs["set_prior_fp"]'

    # 6. Fire webhook alert if the page changed.
    - id: notify
      type: webhook
      title: "Send change alert"
      description: "POST a JSON payload to the webhook URL when the page changed."
      config:
        url: "{{ inputs.webhook_url }}"
        method: "POST"
        payload:
          event: "page_changed"
          url: "{{ inputs.url }}"

    # 7. Persist the current snapshot for the next run's diff.
    - id: persist
      type: memory_write
      title: "Store current snapshot"
      description: "Write the current fingerprint to Qdrant for the next run."
      config:
        collection: "flowmanner_memory"
        text: "{{ inputs.url }}"
        payload:
          fingerprint: "{{ inputs.current_fp }}"
          url: "{{ inputs.url }}"
          source: "scrape-diff-alert"

  edges:
    - source: snap
      target: set_current_fp
    - source: read_prior
      target: set_prior_fp
    - source: set_current_fp
      target: diff
    - source: set_prior_fp
      target: diff
    - source: set_current_fp
      target: persist
    - source: diff
      target: notify
      condition: "{{diff.value}}"

  budget:
    max_cost_usd: 0.50
    max_wall_time_seconds: 120
    max_iterations: 10
    max_depth: 3
  config: {}
